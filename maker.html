<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Novel Maker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
    --gold: #d4af37;
    --gold-hover: #f3c749;
    --gold-dim: rgba(212, 175, 55, 0.2);
    --bg-dark: #050505;
    --bg-panel: #111111;
    --text-main: #e0e0e0;
    --text-muted: #999999;
}

body {
    background-color: var(--bg-dark);
    color: var(--text-main);
    font-family: 'Roboto', sans-serif;
    margin: 0;
    padding: 0;
    overflow-x: hidden;
}

h1, h2, h3, h4 {
    font-family: 'Cinzel', serif;
    color: var(--gold);
    font-weight: 700;
    margin-top: 0;
}

header {
    background: linear-gradient(180deg, #1a1a1a 0%, var(--bg-dark) 100%);
    border-bottom: 2px solid var(--gold);
    padding: 20px 0;
    text-align: center;
    box-shadow: 0 4px 15px rgba(212, 175, 55, 0.15);
}

header h1 {
    font-size: 2.5rem;
    margin: 0;
    letter-spacing: 3px;
    text-transform: uppercase;
}

nav {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 15px;
}

nav button {
    background: transparent;
    color: var(--text-main);
    border: 1px solid var(--gold-dim);
    padding: 10px 20px;
    font-family: 'Cinzel', serif;
    font-size: 1.1rem;
    cursor: pointer;
    transition: all 0.3s;
    border-radius: 4px;
}

nav button:hover, nav button.active {
    background: var(--gold-dim);
    color: var(--gold);
    border-color: var(--gold);
    box-shadow: 0 0 10px var(--gold-dim);
}

main {
    max-width: 1000px;
    margin: 40px auto;
    padding: 0 20px;
}

.view-section {
    display: none;
    background: var(--bg-panel);
    border: 1px solid var(--gold-dim);
    padding: 30px;
    border-radius: 8px;
    box-shadow: 0 0 20px rgba(0,0,0,0.8);
}

.view-section.active {
    display: block;
    animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

.form-group {
    margin-bottom: 25px;
}

label {
    display: block;
    color: var(--gold);
    font-family: 'Cinzel', serif;
    margin-bottom: 8px;
    font-size: 1.1rem;
}

input[type="text"], input[type="file"], select, textarea {
    width: 100%;
    background: #1a1a1a;
    border: 1px solid var(--gold-dim);
    color: var(--text-main);
    padding: 12px;
    border-radius: 4px;
    font-family: 'Roboto', sans-serif;
    box-sizing: border-box;
    transition: border 0.3s;
}

input[type="text"]:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--gold);
    box-shadow: 0 0 8px var(--gold-dim);
}

textarea {
    resize: vertical;
    min-height: 150px;
    line-height: 1.6;
}

.btn {
    background: transparent;
    color: var(--gold);
    border: 1px solid var(--gold);
    padding: 10px 25px;
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.3s;
    border-radius: 4px;
    text-transform: uppercase;
}

.btn:hover {
    background: var(--gold);
    color: var(--bg-dark);
    box-shadow: 0 0 15px var(--gold-dim);
}

.btn-small {
    padding: 5px 15px;
    font-size: 0.9rem;
}

.btn-danger {
    border-color: #a83232;
    color: #a83232;
}

.btn-danger:hover {
    background: #a83232;
    color: white;
    box-shadow: 0 0 15px rgba(168, 50, 50, 0.3);
}

.tags-container {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 10px;
}

.tag {
    background: var(--gold-dim);
    color: var(--gold);
    padding: 5px 15px;
    border-radius: 20px;
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    border: 1px solid var(--gold);
}

.tag span {
    margin-left: 10px;
    cursor: pointer;
    font-weight: bold;
}

.tag span:hover {
    color: #fff;
}

.cover-preview {
    margin-top: 15px;
    max-width: 250px;
    border: 2px solid var(--gold);
    border-radius: 4px;
    display: none;
}

.chapter-card {
    background: #151515;
    border: 1px solid var(--gold-dim);
    padding: 20px;
    margin-bottom: 20px;
    border-radius: 6px;
    border-left: 4px solid var(--gold);
}

.chapter-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
}

.chapter-header input {
    width: 60%;
    font-family: 'Cinzel', serif;
    font-size: 1.5rem;
    color: var(--gold);
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--gold-dim);
}

.act-card {
    background: #1a1a1a;
    padding: 15px;
    margin-top: 15px;
    border-radius: 4px;
    border-left: 2px solid var(--text-muted);
}

.act-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
}

.act-header input {
    width: 50%;
    font-weight: bold;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--text-muted);
    color: var(--text-main);
}

.list-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #1a1a1a;
    padding: 15px;
    border: 1px solid var(--gold-dim);
    margin-bottom: 10px;
    border-radius: 4px;
}

.import-export-panel {
    text-align: center;
    padding: 40px 20px;
}

.radio-group {
    display: flex;
    gap: 20px;
    margin-top: 10px;
}

.radio-group label {
    font-family: 'Roboto', sans-serif;
    color: var(--text-main);
    display: flex;
    align-items: center;
    gap: 5px;
    cursor: pointer;
}

::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg-dark); }
::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--gold); }
</style>
</head>
<body>

<header>
    <h1>Novel Maker</h1>
    <nav>
        <button class="active" onclick="switchTab('principal')">Principal</button>
        <button onclick="switchTab('capitulos')">Capítulos</button>
        <button onclick="switchTab('contribuidores')">Contribuidores</button>
        <button onclick="switchTab('arquivo')">Importar / Exportar</button>
    </nav>
</header>

<main>
    <section id="view-principal" class="view-section active">
        <h2>Detalhes do Livro</h2>
        
        <div class="form-group">
            <label>Capa do Livro</label>
            <input type="file" id="cover-input" accept="image/*" onchange="handleCoverUpload(event)">
            <img id="cover-preview" class="cover-preview" alt="Pré-visualização da Capa">
        </div>

        <div class="form-group">
            <label>Título</label>
            <input type="text" id="book-title" placeholder="O Épico de Ouro" oninput="updateState()">
        </div>

        <div class="form-group">
            <label>Gêneros (Tags)</label>
            <input type="text" id="genre-input" placeholder="Pressione Enter para adicionar">
            <div id="genres-container" class="tags-container"></div>
        </div>

        <div class="form-group">
            <label>Autor</label>
            <input type="text" id="book-author" placeholder="Nome do Autor" oninput="updateState()">
        </div>

        <div class="form-group">
            <label>Empresa</label>
            <select id="book-company" onchange="handleCompanyChange()">
                <option value="DG/ Books">DG/ Books</option>
                <option value="custom">Outra (Personalizada)</option>
            </select>
            <input type="text" id="book-custom-company" placeholder="Digite o nome da empresa" style="display:none; margin-top:10px;" oninput="updateState()">
        </div>

        <div class="form-group">
            <label>Licença: Qualquer pessoa pode alterar este livro?</label>
            <div class="radio-group">
                <label><input type="radio" name="license" value="true" checked onchange="updateState()"> Sim, pode ser editado</label>
                <label><input type="radio" name="license" value="false" onchange="updateState()"> Não, protegido contra edição</label>
            </div>
        </div>
    </section>

    <section id="view-capitulos" class="view-section">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2>Estrutura da História</h2>
            <button class="btn" onclick="addChapter()">Adicionar Capítulo</button>
        </div>
        <div id="chapters-container"></div>
    </section>

    <section id="view-contribuidores" class="view-section">
        <h2>Contribuidores</h2>
        <div class="form-group" style="display: flex; gap: 10px;">
            <input type="text" id="contributor-input" placeholder="Nome do contribuidor">
            <button class="btn" onclick="addContributor()">Adicionar</button>
        </div>
        <div id="contributors-container"></div>
    </section>

    <section id="view-arquivo" class="view-section">
        <div class="import-export-panel">
            <h2>Gerenciamento do Arquivo</h2>
            <p style="color: var(--text-muted); margin-bottom: 30px;">
                Exporte seu livro no formato nativo (.dgbooks) ou importe um arquivo existente para continuar editando.
            </p>
            
            <div style="display: flex; justify-content: center; gap: 30px; flex-wrap: wrap;">
                <div class="chapter-card" style="width: 300px; text-align: center;">
                    <h3>Exportar</h3>
                    <p>Salva o estado atual do livro.</p>
                    <button class="btn" onclick="exportBook()">Exportar .dgbooks</button>
                </div>

                <div class="chapter-card" style="width: 300px; text-align: center;">
                    <h3>Importar</h3>
                    <p>Carrega um arquivo .dgbooks.</p>
                    <input type="file" id="import-input" accept=".dgbooks" style="display: none;" onchange="importBook(event)">
                    <button class="btn" onclick="document.getElementById('import-input').click()">Importar .dgbooks</button>
                </div>
            </div>
        </div>
    </section>
</main>

<script>
let bookState = {
    title: "",
    coverBase64: "",
    coverMime: "",
    genres: [],
    author: "",
    company: "DG/ Books",
    customCompany: "",
    isEditable: true,
    contributors: [],
    chapters: []
};

function switchTab(tabId) {
    document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(el => el.classList.remove('active'));
    document.getElementById('view-' + tabId).classList.add('active');
    event.currentTarget.classList.add('active');
}

function handleCoverUpload(event) {
    const file = event.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            bookState.coverBase64 = e.target.result;
            bookState.coverMime = file.type;
            const preview = document.getElementById('cover-preview');
            preview.src = e.target.result;
            preview.style.display = 'block';
        };
        reader.readAsDataURL(file);
    }
}

function updateState() {
    bookState.title = document.getElementById('book-title').value;
    bookState.author = document.getElementById('book-author').value;
    
    const companySelect = document.getElementById('book-company');
    if (companySelect.value === 'custom') {
        bookState.company = 'custom';
        bookState.customCompany = document.getElementById('book-custom-company').value;
    } else {
        bookState.company = companySelect.value;
        bookState.customCompany = "";
    }

    const licenseOptions = document.getElementsByName('license');
    for (let radio of licenseOptions) {
        if (radio.checked) {
            bookState.isEditable = radio.value === 'true';
            break;
        }
    }
}

function handleCompanyChange() {
    const select = document.getElementById('book-company');
    const customInput = document.getElementById('book-custom-company');
    if (select.value === 'custom') {
        customInput.style.display = 'block';
    } else {
        customInput.style.display = 'none';
        customInput.value = '';
    }
    updateState();
}

document.getElementById('genre-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        e.preventDefault();
        const val = this.value.trim();
        if (val && !bookState.genres.includes(val)) {
            bookState.genres.push(val);
            this.value = '';
            renderGenres();
        }
    }
});

function renderGenres() {
    const container = document.getElementById('genres-container');
    container.innerHTML = '';
    bookState.genres.forEach((genre, index) => {
        const tag = document.createElement('div');
        tag.className = 'tag';
        tag.innerHTML = `${genre} <span onclick="removeGenre(${index})">×</span>`;
        container.appendChild(tag);
    });
}

function removeGenre(index) {
    bookState.genres.splice(index, 1);
    renderGenres();
}

function addContributor() {
    const input = document.getElementById('contributor-input');
    const val = input.value.trim();
    if (val) {
        bookState.contributors.push(val);
        input.value = '';
        renderContributors();
    }
}

function renderContributors() {
    const container = document.getElementById('contributors-container');
    container.innerHTML = '';
    bookState.contributors.forEach((contributor, index) => {
        const div = document.createElement('div');
        div.className = 'list-item';
        div.innerHTML = `
            <span>${contributor}</span>
            <button class="btn btn-small btn-danger" onclick="removeContributor(${index})">Remover</button>
        `;
        container.appendChild(div);
    });
}

function removeContributor(index) {
    bookState.contributors.splice(index, 1);
    renderContributors();
}

function addChapter() {
    bookState.chapters.push({
        title: `Capítulo ${bookState.chapters.length + 1}`,
        acts: []
    });
    renderChapters();
}

function removeChapter(cIndex) {
    bookState.chapters.splice(cIndex, 1);
    renderChapters();
}

function updateChapterTitle(cIndex, val) {
    bookState.chapters[cIndex].title = val;
}

function addAct(cIndex) {
    bookState.chapters[cIndex].acts.push({
        title: `Ato ${bookState.chapters[cIndex].acts.length + 1}`,
        content: ""
    });
    renderChapters();
}

function removeAct(cIndex, aIndex) {
    bookState.chapters[cIndex].acts.splice(aIndex, 1);
    renderChapters();
}

function updateActTitle(cIndex, aIndex, val) {
    bookState.chapters[cIndex].acts[aIndex].title = val;
}

function updateActContent(cIndex, aIndex, val) {
    bookState.chapters[cIndex].acts[aIndex].content = val;
}

function renderChapters() {
    const container = document.getElementById('chapters-container');
    container.innerHTML = '';
    
    bookState.chapters.forEach((chapter, cIndex) => {
        let actsHtml = '';
        chapter.acts.forEach((act, aIndex) => {
            actsHtml += `
                <div class="act-card">
                    <div class="act-header">
                        <input type="text" value="${act.title}" oninput="updateActTitle(${cIndex}, ${aIndex}, this.value)" placeholder="Nome do Ato">
                        <button class="btn btn-small btn-danger" onclick="removeAct(${cIndex}, ${aIndex})">Remover Ato</button>
                    </div>
                    <textarea placeholder="Escreva a história aqui..." oninput="updateActContent(${cIndex}, ${aIndex}, this.value)">${act.content}</textarea>
                </div>
            `;
        });

        const chapterHtml = `
            <div class="chapter-card">
                <div class="chapter-header">
                    <input type="text" value="${chapter.title}" oninput="updateChapterTitle(${cIndex}, this.value)" placeholder="Nome do Capítulo">
                    <div>
                        <button class="btn btn-small" onclick="addAct(${cIndex})">Novo Ato</button>
                        <button class="btn btn-small btn-danger" onclick="removeChapter(${cIndex})">Excluir Capítulo</button>
                    </div>
                </div>
                <div class="acts-container">
                    ${actsHtml}
                </div>
            </div>
        `;
        container.innerHTML += chapterHtml;
    });
}

function syncUIToState() {
    document.getElementById('book-title').value = bookState.title || '';
    document.getElementById('book-author').value = bookState.author || '';
    
    const companySelect = document.getElementById('book-company');
    const customInput = document.getElementById('book-custom-company');
    
    if (bookState.company === 'custom' || (!['DG/ Books'].includes(bookState.company) && bookState.company !== '')) {
        companySelect.value = 'custom';
        customInput.style.display = 'block';
        customInput.value = bookState.customCompany || bookState.company;
    } else {
        companySelect.value = 'DG/ Books';
        customInput.style.display = 'none';
    }

    const licenseOptions = document.getElementsByName('license');
    licenseOptions[0].checked = bookState.isEditable === true;
    licenseOptions[1].checked = bookState.isEditable === false;

    if (bookState.coverBase64) {
        const preview = document.getElementById('cover-preview');
        preview.src = bookState.coverBase64;
        preview.style.display = 'block';
    } else {
        document.getElementById('cover-preview').style.display = 'none';
    }

    renderGenres();
    renderContributors();
    renderChapters();
}

async function exportBook() {
    updateState();
    const zip = new JSZip();
    
    const dataFolder = zip.folder("data");
    const imgFolder = zip.folder("images");

    const exportData = JSON.parse(JSON.stringify(bookState));
    
    if (exportData.coverBase64) {
        const base64Data = exportData.coverBase64.split(',')[1];
        const ext = exportData.coverMime.split('/')[1] || 'png';
        const filename = `capa.${ext}`;
        imgFolder.file(filename, base64Data, {base64: true});
        exportData.coverPath = `images/${filename}`;
        delete exportData.coverBase64; 
    }

    dataFolder.file("book.json", JSON.stringify(exportData, null, 2));

    try {
        const content = await zip.generateAsync({type: "blob"});
        const url = URL.createObjectURL(content);
        const a = document.createElement("a");
        a.href = url;
        const safeTitle = (bookState.title || "novo_livro").replace(/[^a-z0-9]/gi, '_').toLowerCase();
        a.download = `${safeTitle}.dgbooks`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    } catch (e) {
        alert("Erro ao exportar o livro.");
    }
}

async function importBook(event) {
    const file = event.target.files[0];
    if (!file) return;

    event.target.value = '';

    const zip = new JSZip();
    try {
        const contents = await zip.loadAsync(file);
        
        const jsonFile = contents.file("data/book.json");
        if (!jsonFile) {
            alert("Arquivo inválido. Formato .dgbooks corrompido.");
            return;
        }

        const jsonText = await jsonFile.async("string");
        const importedData = JSON.parse(jsonText);

        if (importedData.isEditable === false) {
            alert("Aviso: Este livro está marcado com licença restrita e não pode ser editado nem importado neste sistema.");
            return;
        }

        bookState = importedData;

        if (bookState.coverPath) {
            const imgFile = contents.file(bookState.coverPath);
            if (imgFile) {
                const base64Data = await imgFile.async("base64");
                const ext = bookState.coverPath.split('.').pop();
                bookState.coverMime = `image/${ext}`;
                bookState.coverBase64 = `data:image/${ext};base64,${base64Data}`;
            }
        }

        syncUIToState();
        switchTab('principal');
        alert("Livro importado com sucesso!");

    } catch (e) {
        alert("Erro ao ler o arquivo. Certifique-se de que é um .dgbooks válido.");
    }
}

renderChapters();
</script>
</body>
</html>
