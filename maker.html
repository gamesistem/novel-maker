<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
<title>Novel Maker - Estúdio Mobile</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
    --gold: #d4af37;
    --gold-hover: #f3c749;
    --gold-dim: rgba(212, 175, 55, 0.2);
    --bg-dark: #050505;
    --bg-panel: #111111;
    --text-main: #e0e0e0;
    --text-muted: #999999;
    --danger: #a83232;
}

* {
    box-sizing: border-box;
}

body {
    background-color: var(--bg-dark);
    color: var(--text-main);
    font-family: 'Roboto', sans-serif;
    margin: 0;
    padding: 0;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
}

h1, h2, h3, h4 {
    font-family: 'Cinzel', serif;
    color: var(--gold);
    font-weight: 700;
    margin-top: 0;
    word-break: break-word;
}

header {
    background: linear-gradient(180deg, #1a1a1a 0%, var(--bg-dark) 100%);
    border-bottom: 2px solid var(--gold);
    padding: 16px 12px;
    text-align: center;
    box-shadow: 0 4px 15px rgba(212, 175, 55, 0.15);
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(2px);
}

header h1 {
    font-size: 1.8rem;
    margin: 0;
    letter-spacing: 2px;
    text-transform: uppercase;
}

nav {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 12px;
    padding: 0 4px;
}

nav button {
    background: transparent;
    color: var(--text-main);
    border: 1px solid var(--gold-dim);
    padding: 8px 14px;
    font-family: 'Cinzel', serif;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s ease;
    border-radius: 40px;
    font-weight: 500;
    flex: 0 0 auto;
    white-space: nowrap;
}

nav button:hover, nav button.active {
    background: var(--gold-dim);
    color: var(--gold);
    border-color: var(--gold);
    box-shadow: 0 0 8px var(--gold-dim);
}

main {
    max-width: 1000px;
    margin: 20px auto;
    padding: 0 16px;
}

.view-section {
    display: none;
    background: var(--bg-panel);
    border: 1px solid var(--gold-dim);
    padding: 20px 18px;
    border-radius: 20px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.6);
}

.view-section.active {
    display: block;
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
}

.form-group {
    margin-bottom: 24px;
}

label {
    display: block;
    color: var(--gold);
    font-family: 'Cinzel', serif;
    margin-bottom: 8px;
    font-size: 1rem;
    font-weight: 500;
}

input[type="text"], input[type="file"], select, textarea {
    width: 100%;
    background: #1a1a1a;
    border: 1px solid var(--gold-dim);
    color: var(--text-main);
    padding: 12px 14px;
    border-radius: 12px;
    font-family: 'Roboto', sans-serif;
    font-size: 1rem;
    transition: all 0.2s;
    box-sizing: border-box;
}

textarea {
    resize: vertical;
    min-height: 140px;
    line-height: 1.5;
    font-size: 0.95rem;
}

input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--gold);
    box-shadow: 0 0 0 2px var(--gold-dim);
}

.btn {
    background: transparent;
    color: var(--gold);
    border: 1px solid var(--gold);
    padding: 10px 18px;
    font-family: 'Cinzel', serif;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 40px;
    text-transform: uppercase;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
}

.btn:active {
    transform: scale(0.97);
}

.btn:hover {
    background: var(--gold);
    color: var(--bg-dark);
    box-shadow: 0 0 12px var(--gold-dim);
}

.btn-small {
    padding: 6px 14px;
    font-size: 0.8rem;
}

.btn-danger {
    border-color: var(--danger);
    color: var(--danger);
}

.btn-danger:hover {
    background: var(--danger);
    color: white;
}

.tags-container {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 12px;
}

.tag {
    background: var(--gold-dim);
    color: var(--gold);
    padding: 6px 14px;
    border-radius: 40px;
    font-size: 0.85rem;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border: 1px solid var(--gold);
    word-break: break-all;
}

.tag span {
    cursor: pointer;
    font-weight: bold;
    font-size: 1.2rem;
    line-height: 1;
}

.tag span:hover {
    color: #fff;
}

.cover-preview {
    margin-top: 16px;
    max-width: 100%;
    width: auto;
    max-height: 200px;
    border: 2px solid var(--gold);
    border-radius: 12px;
    object-fit: contain;
    background: #0a0a0a;
    display: none;
}

.chapter-card {
    background: #151515;
    border: 1px solid var(--gold-dim);
    padding: 18px;
    margin-bottom: 24px;
    border-radius: 20px;
    border-left: 4px solid var(--gold);
}

.chapter-header {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin-bottom: 18px;
}

.chapter-header input {
    flex: 2;
    min-width: 180px;
    font-family: 'Cinzel', serif;
    font-size: 1.3rem;
    color: var(--gold);
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--gold-dim);
    padding: 6px 0;
}

.chapter-header > div {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.act-card {
    background: #1e1e1e;
    padding: 16px;
    margin-top: 18px;
    border-radius: 16px;
    border-left: 2px solid var(--text-muted);
}

.act-header {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
}

.act-header input {
    flex: 2;
    min-width: 140px;
    font-weight: bold;
    background: #0f0f0f;
    border: 1px solid var(--gold-dim);
    border-radius: 40px;
    padding: 8px 12px;
    color: var(--text-main);
}

.list-item {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    background: #1a1a1a;
    padding: 14px 18px;
    border: 1px solid var(--gold-dim);
    margin-bottom: 12px;
    border-radius: 16px;
}

.import-export-panel {
    text-align: center;
    padding: 20px 12px;
}

.radio-group {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    margin-top: 10px;
}

.radio-group label {
    font-family: 'Roboto', sans-serif;
    color: var(--text-main);
    display: inline-flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    font-weight: normal;
    font-size: 0.95rem;
}

/* ========= RESPONSIVE (MOBILE-FIRST) ========= */
@media (max-width: 680px) {
    main {
        padding: 0 12px;
        margin: 16px auto;
    }
    
    .view-section {
        padding: 18px 14px;
    }
    
    nav button {
        padding: 6px 12px;
        font-size: 0.8rem;
        white-space: nowrap;
    }
    
    .chapter-header {
        flex-direction: column;
        align-items: stretch;
    }
    
    .chapter-header input {
        width: 100%;
        font-size: 1.2rem;
    }
    
    .chapter-header > div {
        justify-content: flex-start;
    }
    
    .act-header {
        flex-direction: column;
        align-items: stretch;
    }
    
    .act-header input {
        width: 100%;
    }
    
    .act-header button {
        align-self: flex-start;
    }
    
    .btn, .btn-small {
        padding: 8px 14px;
    }
    
    .chapter-card {
        padding: 14px;
    }
    
    .list-item {
        flex-direction: column;
        align-items: stretch;
        text-align: left;
    }
    
    .list-item button {
        align-self: flex-start;
    }
    
    .import-export-panel .chapter-card {
        width: 100% !important;
        margin-bottom: 16px;
    }
    
    .import-export-panel {
        display: flex;
        flex-direction: column;
        gap: 16px;
    }
    
    .radio-group {
        flex-direction: column;
        gap: 10px;
    }
    
    header h1 {
        font-size: 1.5rem;
    }
    
    .tags-container {
        gap: 8px;
    }
    
    .tag {
        font-size: 0.8rem;
        padding: 5px 12px;
    }
    
    textarea {
        font-size: 0.9rem;
    }
    
    input, select, textarea {
        font-size: 16px; /* previne zoom automático em iOS */
    }
}

@media (max-width: 480px) {
    .chapter-header input {
        font-size: 1.1rem;
    }
    
    .btn {
        width: auto;
    }
    
    .view-section {
        padding: 14px 12px;
    }
    
    .act-card {
        padding: 12px;
    }
}

/* scrollbar elegante */
::-webkit-scrollbar {
    width: 6px;
}
::-webkit-scrollbar-track {
    background: var(--bg-dark);
}
::-webkit-scrollbar-thumb {
    background: var(--gold-dim);
    border-radius: 8px;
}
</style>
</head>
<body>

<header>
    <h1>📖 Novel Maker</h1>
    <nav>
        <button class="active" onclick="switchTab('principal', this)">📘 Principal</button>
        <button onclick="switchTab('capitulos', this)">✍️ Capítulos</button>
        <button onclick="switchTab('contribuidores', this)">🤝 Contribuidores</button>
        <button onclick="switchTab('arquivo', this)">💾 Arquivo</button>
    </nav>
</header>

<main>
    <section id="view-principal" class="view-section active">
        <h2>📖 Detalhes do Livro</h2>
        
        <div class="form-group">
            <label>🎨 Capa do Livro</label>
            <input type="file" id="cover-input" accept="image/*" onchange="handleCoverUpload(event)">
            <img id="cover-preview" class="cover-preview" alt="Pré-visualização da Capa">
        </div>

        <div class="form-group">
            <label>🏷️ Título</label>
            <input type="text" id="book-title" placeholder="O Épico de Ouro" oninput="updateState()">
        </div>

        <div class="form-group">
            <label>🔖 Gêneros (Tags)</label>
            <input type="text" id="genre-input" placeholder="Digite um gênero e pressione Enter">
            <div id="genres-container" class="tags-container"></div>
        </div>

        <div class="form-group">
            <label>✍️ Autor</label>
            <input type="text" id="book-author" placeholder="Nome do Autor" oninput="updateState()">
        </div>

        <div class="form-group">
            <label>🏢 Empresa / Selo</label>
            <select id="book-company" onchange="handleCompanyChange()">
                <option value="DG/ Books">DG/ Books</option>
                <option value="custom">📝 Outra (Personalizada)</option>
            </select>
            <input type="text" id="book-custom-company" placeholder="Digite o nome da empresa" style="display:none; margin-top:12px;" oninput="updateState()">
        </div>

        <div class="form-group">
            <label>🔓 Licença: Qualquer pessoa pode alterar este livro?</label>
            <div class="radio-group">
                <label><input type="radio" name="license" value="true" checked onchange="updateState()"> ✅ Sim, pode ser editado</label>
                <label><input type="radio" name="license" value="false" onchange="updateState()"> 🔒 Não, protegido contra edição</label>
            </div>
        </div>
    </section>

    <section id="view-capitulos" class="view-section">
        <div style="display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 20px;">
            <h2>📑 Estrutura da História</h2>
            <button class="btn" onclick="addChapter()">+ Adicionar Capítulo</button>
        </div>
        <div id="chapters-container"></div>
    </section>

    <section id="view-contribuidores" class="view-section">
        <h2>👥 Contribuidores</h2>
        <div class="form-group" style="display: flex; flex-wrap: wrap; gap: 10px;">
            <input type="text" id="contributor-input" placeholder="Nome do contribuidor" style="flex: 2;">
            <button class="btn" onclick="addContributor()">Adicionar</button>
        </div>
        <div id="contributors-container"></div>
    </section>

    <section id="view-arquivo" class="view-section">
        <div class="import-export-panel">
            <h2>📂 Gerenciamento</h2>
            <p style="color: var(--text-muted); margin-bottom: 24px;">
                Exporte seu livro no formato .dgbooks ou importe um existente.
            </p>
            
            <div style="display: flex; justify-content: center; gap: 24px; flex-wrap: wrap;">
                <div class="chapter-card" style="width: 280px; text-align: center; background: #111;">
                    <h3>⬇️ Exportar</h3>
                    <p>Salva todo o projeto.</p>
                    <button class="btn" onclick="exportBook()">Exportar .dgbooks</button>
                </div>

                <div class="chapter-card" style="width: 280px; text-align: center; background: #111;">
                    <h3>📂 Importar</h3>
                    <p>Carregue um arquivo .dgbooks.</p>
                    <input type="file" id="import-input" accept=".dgbooks" style="display: none;" onchange="importBook(event)">
                    <button class="btn" onclick="document.getElementById('import-input').click()">Importar .dgbooks</button>
                </div>
            </div>
        </div>
    </section>
</main>

<script>
// ---------- ESTADO GLOBAL ----------
let bookState = {
    title: "",
    coverBase64: "",
    coverMime: "",
    genres: [],
    author: "",
    company: "DG/ Books",
    customCompany: "",
    isEditable: true,
    contributors: [],
    chapters: []
};

// ---------- FUNÇÕES DE NAVEGAÇÃO (CORRIGIDAS) ----------
function switchTab(tabId, btnElement) {
    document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(el => el.classList.remove('active'));
    document.getElementById('view-' + tabId).classList.add('active');
    if (btnElement) btnElement.classList.add('active');
}

// ---------- CAPA ----------
function handleCoverUpload(event) {
    const file = event.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            bookState.coverBase64 = e.target.result;
            bookState.coverMime = file.type;
            const preview = document.getElementById('cover-preview');
            preview.src = e.target.result;
            preview.style.display = 'block';
        };
        reader.readAsDataURL(file);
    }
}

// ---------- METADADOS ----------
function updateState() {
    bookState.title = document.getElementById('book-title').value;
    bookState.author = document.getElementById('book-author').value;
    
    const companySelect = document.getElementById('book-company');
    if (companySelect.value === 'custom') {
        bookState.company = 'custom';
        bookState.customCompany = document.getElementById('book-custom-company').value;
    } else {
        bookState.company = companySelect.value;
        bookState.customCompany = "";
    }

    const licenseOptions = document.getElementsByName('license');
    for (let radio of licenseOptions) {
        if (radio.checked) {
            bookState.isEditable = radio.value === 'true';
            break;
        }
    }
}

function handleCompanyChange() {
    const select = document.getElementById('book-company');
    const customInput = document.getElementById('book-custom-company');
    if (select.value === 'custom') {
        customInput.style.display = 'block';
    } else {
        customInput.style.display = 'none';
        customInput.value = '';
    }
    updateState();
}

// ---------- GÊNEROS (TAGS) ----------
document.getElementById('genre-input')?.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        e.preventDefault();
        const val = this.value.trim();
        if (val && !bookState.genres.includes(val)) {
            bookState.genres.push(val);
            this.value = '';
            renderGenres();
        }
    }
});

function renderGenres() {
    const container = document.getElementById('genres-container');
    if (!container) return;
    container.innerHTML = '';
    bookState.genres.forEach((genre, index) => {
        const tag = document.createElement('div');
        tag.className = 'tag';
        tag.innerHTML = `${escapeHtml(genre)} <span onclick="removeGenre(${index})">×</span>`;
        container.appendChild(tag);
    });
}

function removeGenre(index) {
    bookState.genres.splice(index, 1);
    renderGenres();
}

// ---------- CONTRIBUIDORES ----------
function addContributor() {
    const input = document.getElementById('contributor-input');
    const val = input.value.trim();
    if (val && !bookState.contributors.includes(val)) {
        bookState.contributors.push(val);
        input.value = '';
        renderContributors();
    }
}

function renderContributors() {
    const container = document.getElementById('contributors-container');
    if (!container) return;
    container.innerHTML = '';
    bookState.contributors.forEach((contributor, index) => {
        const div = document.createElement('div');
        div.className = 'list-item';
        div.innerHTML = `
            <span>👤 ${escapeHtml(contributor)}</span>
            <button class="btn btn-small btn-danger" onclick="removeContributor(${index})">Remover</button>
        `;
        container.appendChild(div);
    });
}

function removeContributor(index) {
    bookState.contributors.splice(index, 1);
    renderContributors();
}

// ---------- CAPÍTULOS E ATOS (ESTRUTURA COMPLETA) ----------
function addChapter() {
    bookState.chapters.push({
        title: `Capítulo ${bookState.chapters.length + 1}`,
        acts: []
    });
    renderChapters();
}

function removeChapter(cIndex) {
    if (confirm("Excluir este capítulo e todos os seus atos?")) {
        bookState.chapters.splice(cIndex, 1);
        renderChapters();
    }
}

function updateChapterTitle(cIndex, val) {
    bookState.chapters[cIndex].title = val;
}

function addAct(cIndex) {
    bookState.chapters[cIndex].acts.push({
        title: `Ato ${bookState.chapters[cIndex].acts.length + 1}`,
        content: ""
    });
    renderChapters();
}

function removeAct(cIndex, aIndex) {
    if (confirm("Remover este ato?")) {
        bookState.chapters[cIndex].acts.splice(aIndex, 1);
        renderChapters();
    }
}

function updateActTitle(cIndex, aIndex, val) {
    bookState.chapters[cIndex].acts[aIndex].title = val;
}

function updateActContent(cIndex, aIndex, val) {
    bookState.chapters[cIndex].acts[aIndex].content = val;
}

// escape simples para evitar quebras HTML (preserva conteúdo)
function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
        return c;
    });
}

function renderChapters() {
    const container = document.getElementById('chapters-container');
    if (!container) return;
    container.innerHTML = '';
    
    bookState.chapters.forEach((chapter, cIndex) => {
        let actsHtml = '';
        chapter.acts.forEach((act, aIndex) => {
            const safeActTitle = escapeHtml(act.title);
            const safeContent = act.content; // mantém quebras, sem escape para textarea
            actsHtml += `
                <div class="act-card">
                    <div class="act-header">
                        <input type="text" value="${safeActTitle}" oninput="updateActTitle(${cIndex}, ${aIndex}, this.value)" placeholder="Nome do Ato">
                        <button class="btn btn-small btn-danger" onclick="removeAct(${cIndex}, ${aIndex})">🗑️ Remover Ato</button>
                    </div>
                    <textarea placeholder="Desenvolva a cena, diálogos ou narração..." oninput="updateActContent(${cIndex}, ${aIndex}, this.value)">${escapeTextareaContent(safeContent)}</textarea>
                </div>
            `;
        });

        const safeChapterTitle = escapeHtml(chapter.title);
        const chapterHtml = `
            <div class="chapter-card">
                <div class="chapter-header">
                    <input type="text" value="${safeChapterTitle}" oninput="updateChapterTitle(${cIndex}, this.value)" placeholder="Nome do Capítulo">
                    <div>
                        <button class="btn btn-small" onclick="addAct(${cIndex})">+ Ato</button>
                        <button class="btn btn-small btn-danger" onclick="removeChapter(${cIndex})">🗑️ Capítulo</button>
                    </div>
                </div>
                <div class="acts-container">
                    ${actsHtml}
                </div>
            </div>
        `;
        container.innerHTML += chapterHtml;
    });
}

// Função auxiliar para não quebrar textarea com caracteres especiais
function escapeTextareaContent(str) {
    if (!str) return '';
    return str.replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ---------- SINCRONIZAR UI A PARTIR DO STATE ----------
function syncUIToState() {
    document.getElementById('book-title').value = bookState.title || '';
    document.getElementById('book-author').value = bookState.author || '';
    
    const companySelect = document.getElementById('book-company');
    const customInput = document.getElementById('book-custom-company');
    
    // empresa: se for custom ou valor diferente de DG/Books
    if (bookState.company === 'custom' || (bookState.company && bookState.company !== 'DG/ Books' && bookState.company !== '')) {
        companySelect.value = 'custom';
        customInput.style.display = 'block';
        customInput.value = bookState.customCompany || (bookState.company !== 'custom' ? bookState.company : '');
    } else {
        companySelect.value = 'DG/ Books';
        customInput.style.display = 'none';
        customInput.value = '';
    }
    
    const licenseRadios = document.getElementsByName('license');
    licenseRadios[0].checked = (bookState.isEditable === true);
    licenseRadios[1].checked = (bookState.isEditable === false);
    
    if (bookState.coverBase64) {
        const preview = document.getElementById('cover-preview');
        preview.src = bookState.coverBase64;
        preview.style.display = 'block';
    } else {
        document.getElementById('cover-preview').style.display = 'none';
    }
    
    renderGenres();
    renderContributors();
    renderChapters();
}

// ---------- EXPORTAR (ZIP + .dgbooks) ----------
async function exportBook() {
    updateState(); // captura campos atuais
    
    const zip = new JSZip();
    const dataFolder = zip.folder("data");
    const imgFolder = zip.folder("images");
    
    const exportData = JSON.parse(JSON.stringify(bookState));
    
    if (exportData.coverBase64) {
        const base64Data = exportData.coverBase64.split(',')[1];
        const ext = (exportData.coverMime && exportData.coverMime.split('/')[1]) || 'png';
        const filename = `capa.${ext}`;
        imgFolder.file(filename, base64Data, {base64: true});
        exportData.coverPath = `images/${filename}`;
        delete exportData.coverBase64;
        delete exportData.coverMime;
    } else {
        exportData.coverPath = "";
    }
    
    dataFolder.file("book.json", JSON.stringify(exportData, null, 2));
    
    try {
        const content = await zip.generateAsync({type: "blob"});
        const url = URL.createObjectURL(content);
        const a = document.createElement("a");
        a.href = url;
        const safeTitle = (bookState.title || "novo_livro").replace(/[^a-z0-9]/gi, '_').toLowerCase();
        a.download = `${safeTitle}.dgbooks`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        alert("✅ Livro exportado com sucesso!");
    } catch (e) {
        alert("❌ Erro ao exportar o livro.");
        console.error(e);
    }
}

// ---------- IMPORTAR ----------
async function importBook(event) {
    const file = event.target.files[0];
    if (!file) return;
    event.target.value = '';
    
    const zip = new JSZip();
    try {
        const contents = await zip.loadAsync(file);
        const jsonFile = contents.file("data/book.json");
        if (!jsonFile) {
            alert("Arquivo inválido. Formato .dgbooks corrompido.");
            return;
        }
        const jsonText = await jsonFile.async("string");
        const importedData = JSON.parse(jsonText);
        
        if (importedData.isEditable === false) {
            alert("⚠️ Este livro possui licença restrita (protegido contra edição). Não é possível importar/editar neste sistema.");
            return;
        }
        
        bookState = importedData;
        
        if (bookState.coverPath) {
            const imgFile = contents.file(bookState.coverPath);
            if (imgFile) {
                const base64Data = await imgFile.async("base64");
                const ext = bookState.coverPath.split('.').pop();
                bookState.coverMime = `image/${ext}`;
                bookState.coverBase64 = `data:image/${ext};base64,${base64Data}`;
            } else {
                bookState.coverBase64 = "";
            }
        } else {
            bookState.coverBase64 = "";
        }
        
        // garantir arrays
        if (!bookState.genres) bookState.genres = [];
        if (!bookState.contributors) bookState.contributors = [];
        if (!bookState.chapters) bookState.chapters = [];
        
        syncUIToState();
        switchTab('principal', document.querySelector('nav button.active') || document.querySelector('nav button'));
        alert("📚 Livro importado com sucesso!");
    } catch (e) {
        alert("Erro ao ler o arquivo. Verifique o formato .dgbooks.");
        console.error(e);
    }
}

// Inicialização e sincronização na carga
document.addEventListener('DOMContentLoaded', () => {
    syncUIToState();
    // listener adicional para o campo de empresa custom
    document.getElementById('book-custom-company')?.addEventListener('input', updateState);
    // garantir que cover preview não suma
    if (bookState.coverBase64) {
        const preview = document.getElementById('cover-preview');
        preview.src = bookState.coverBase64;
        preview.style.display = 'block';
    }
});
