<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DG/Books — Editor de Novel</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root {
    --bg: #0d0b07;
    --bg2: #13110c;
    --bg3: #1a1710;
    --bg4: #221e15;
    --surface: #2a2518;
    --surface2: #332d1e;
    --gold: #c9a84c;
    --gold2: #e8c97a;
    --gold3: #f5e4b0;
    --goldDark: #7a6225;
    --text: #f0e8d5;
    --textMuted: #a09070;
    --textFaint: #5a5040;
    --red: #c0472a;
    --redLight: #e8705a;
    --border: #3a3220;
    --borderGold: rgba(201,168,76,0.25);
    --radius: 6px;
    --font-title: 'Cinzel', serif;
    --font-body: 'Crimson Pro', serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 17px;
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--goldDark); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--gold); }

  /* LAYOUT */
  .app { display: flex; height: 100vh; }

  /* SIDEBAR */
  .sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-logo {
    padding: 20px 18px 16px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-logo h1 {
    font-family: var(--font-title);
    font-size: 18px;
    color: var(--gold2);
    letter-spacing: 0.12em;
  }
  .sidebar-logo p {
    font-size: 11px;
    color: var(--textFaint);
    letter-spacing: 0.06em;
    font-family: var(--font-mono);
    margin-top: 2px;
  }

  .sidebar-nav {
    display: flex;
    flex-direction: column;
    padding: 12px 0;
    gap: 2px;
  }

  .nav-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 18px;
    background: none;
    border: none;
    color: var(--textMuted);
    font-family: var(--font-title);
    font-size: 12px;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.18s;
    text-align: left;
    border-left: 2px solid transparent;
  }
  .nav-btn:hover { color: var(--gold2); background: var(--bg3); }
  .nav-btn.active { color: var(--gold2); background: var(--bg3); border-left-color: var(--gold); }
  .nav-btn svg { width: 15px; height: 15px; flex-shrink: 0; }

  .sidebar-tree {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
    border-top: 1px solid var(--border);
  }

  .tree-chapter {
    user-select: none;
  }
  .tree-chapter-header {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px 6px 12px;
    cursor: pointer;
    color: var(--textMuted);
    font-size: 12px;
    font-family: var(--font-title);
    letter-spacing: 0.07em;
    transition: color 0.15s;
  }
  .tree-chapter-header:hover { color: var(--gold2); }
  .tree-chapter-header .toggle { font-size: 10px; color: var(--textFaint); }
  .tree-chapter-header.active { color: var(--gold2); }

  .tree-acts { padding-left: 12px; }
  .tree-act {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 10px 5px 14px;
    cursor: pointer;
    color: var(--textFaint);
    font-size: 11px;
    font-family: var(--font-body);
    font-style: italic;
    border-left: 1px solid var(--border);
    transition: color 0.15s, border-color 0.15s;
  }
  .tree-act:hover { color: var(--gold2); border-left-color: var(--goldDark); }
  .tree-act.active { color: var(--gold); border-left-color: var(--gold); }

  .sidebar-footer {
    padding: 14px 18px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .export-btn {
    width: 100%;
    padding: 10px;
    background: var(--goldDark);
    border: 1px solid var(--borderGold);
    border-radius: var(--radius);
    color: var(--gold3);
    font-family: var(--font-title);
    font-size: 12px;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.18s;
  }
  .export-btn:hover { background: var(--gold); color: var(--bg); }
  .export-btn.secondary {
    background: transparent;
    border-color: var(--border);
    color: var(--textMuted);
    font-size: 11px;
  }
  .export-btn.secondary:hover { background: var(--bg3); color: var(--gold2); border-color: var(--borderGold); }

  /* EXPORT CHAPTER MODAL */
  .modal.wide { width: 560px; }
  .chap-select-list { display: flex; flex-direction: column; gap: 6px; max-height: 320px; overflow-y: auto; margin-top: 4px; }
  .chap-select-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  .chap-select-item:hover { border-color: var(--borderGold); background: var(--bg4); }
  .chap-select-item.selected { border-color: var(--goldDark); background: rgba(122,98,37,0.15); }
  .chap-select-item input[type="checkbox"] { accent-color: var(--gold); width: 15px; height: 15px; cursor: pointer; flex-shrink: 0; }
  .chap-select-item label { flex: 1; cursor: pointer; }
  .chap-select-item .csi-num { font-family: var(--font-mono); font-size: 10px; color: var(--textFaint); }
  .chap-select-item .csi-title { font-family: var(--font-title); font-size: 12px; color: var(--gold2); letter-spacing: 0.07em; display: block; }
  .chap-select-item .csi-meta { font-size: 11px; color: var(--textFaint); font-family: var(--font-mono); }
  .select-actions { display: flex; gap: 8px; margin-bottom: 12px; }
  .select-all-btn {
    background: none; border: 1px solid var(--border); border-radius: 4px;
    color: var(--textFaint); font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 0.08em; padding: 4px 10px; cursor: pointer; transition: all 0.15s;
  }
  .select-all-btn:hover { border-color: var(--borderGold); color: var(--gold2); }

  /* MAIN CONTENT */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    gap: 12px;
  }
  .topbar-title {
    font-family: var(--font-title);
    font-size: 13px;
    color: var(--gold2);
    letter-spacing: 0.1em;
  }
  .topbar-actions { display: flex; gap: 8px; }

  .btn {
    padding: 7px 16px;
    border-radius: var(--radius);
    font-family: var(--font-title);
    font-size: 11px;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.18s;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--textMuted);
  }
  .btn:hover { background: var(--surface); color: var(--gold2); border-color: var(--borderGold); }
  .btn.primary { background: var(--goldDark); border-color: var(--borderGold); color: var(--gold3); }
  .btn.primary:hover { background: var(--gold); color: var(--bg); }
  .btn.danger { background: none; border-color: rgba(192,71,42,0.3); color: var(--red); }
  .btn.danger:hover { background: rgba(192,71,42,0.15); }
  .btn.small { padding: 4px 10px; font-size: 10px; }

  /* PANELS */
  .panel { flex: 1; overflow-y: auto; padding: 28px; display: none; }
  .panel.active { display: block; }

  /* INFO PANEL */
  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    max-width: 780px;
  }
  .cover-upload {
    grid-column: 1 / -1;
    display: flex;
    align-items: flex-start;
    gap: 24px;
  }
  .cover-preview {
    width: 120px;
    height: 168px;
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: border-color 0.15s;
    overflow: hidden;
    flex-shrink: 0;
    background: var(--bg3);
  }
  .cover-preview:hover { border-color: var(--goldDark); }
  .cover-preview img { width: 100%; height: 100%; object-fit: cover; }
  .cover-preview span { color: var(--textFaint); font-size: 12px; text-align: center; padding: 8px; font-family: var(--font-mono); }
  #coverInput { display: none; }

  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label { font-size: 11px; font-family: var(--font-title); letter-spacing: 0.1em; color: var(--textMuted); }
  .form-group input, .form-group textarea, .form-group select {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 15px;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }
  .form-group input:focus, .form-group textarea:focus { border-color: var(--goldDark); }
  .form-group textarea { resize: vertical; min-height: 80px; }

  .company-row { display: flex; align-items: center; gap: 10px; }
  .company-row input[type="checkbox"] { width: 15px; height: 15px; accent-color: var(--gold); cursor: pointer; }
  .company-row label { font-size: 13px; color: var(--textMuted); cursor: pointer; margin: 0; font-family: var(--font-body); }

  /* CHAPTER PANEL */
  .chapter-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .chapter-header h2 { font-family: var(--font-title); font-size: 16px; color: var(--gold2); letter-spacing: 0.1em; }

  .chapters-list { display: flex; flex-direction: column; gap: 12px; max-width: 700px; }
  .chapter-card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .chapter-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    cursor: pointer;
    transition: background 0.15s;
    border-bottom: 1px solid transparent;
  }
  .chapter-card-header:hover { background: var(--bg4); }
  .chapter-card-header.open { border-bottom-color: var(--border); }
  .chapter-card-title {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--font-title);
    font-size: 13px;
    color: var(--gold2);
    letter-spacing: 0.07em;
  }
  .chapter-num {
    background: var(--goldDark);
    color: var(--gold3);
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 3px;
    font-family: var(--font-mono);
  }
  .chapter-card-acts { padding: 12px 16px; display: none; }
  .chapter-card-acts.open { display: block; }

  .acts-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
  .act-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    background: var(--bg4);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.15s;
    font-size: 13px;
    color: var(--textMuted);
  }
  .act-item:hover { border-color: var(--borderGold); color: var(--gold2); }
  .act-item .act-badge {
    font-size: 10px;
    font-family: var(--font-mono);
    color: var(--textFaint);
    background: var(--bg2);
    padding: 2px 6px;
    border-radius: 3px;
  }
  .act-item .act-preview {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-style: italic;
    font-size: 12px;
    color: var(--textFaint);
  }

  /* ACT EDITOR */
  .act-editor { max-width: 820px; }
  .act-editor-header { margin-bottom: 24px; }
  .act-editor-header h2 { font-family: var(--font-title); font-size: 15px; color: var(--gold2); letter-spacing: 0.1em; }
  .act-editor-header p { color: var(--textFaint); font-size: 13px; margin-top: 4px; font-family: var(--font-mono); }

  .blocks-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }

  .block {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    position: relative;
    transition: border-color 0.15s;
  }
  .block:hover { border-color: rgba(201,168,76,0.2); }
  .block.narrator { border-left: 3px solid var(--textFaint); }
  .block.character { border-left: 3px solid var(--goldDark); }

  .block-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: var(--bg4);
    border-bottom: 1px solid var(--border);
  }
  .block-type-badge {
    font-size: 10px;
    font-family: var(--font-mono);
    padding: 2px 8px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .block-type-badge.narrator { background: rgba(90,80,64,0.5); color: var(--textMuted); }
  .block-type-badge.character { background: rgba(122,98,37,0.4); color: var(--gold2); }

  .block-char-name {
    font-family: var(--font-title);
    font-size: 12px;
    color: var(--gold);
    letter-spacing: 0.08em;
    flex: 1;
  }
  .block-char-name input {
    background: transparent;
    border: none;
    outline: none;
    color: var(--gold);
    font-family: var(--font-title);
    font-size: 12px;
    letter-spacing: 0.08em;
    width: 140px;
  }
  .block-char-name input::placeholder { color: var(--textFaint); font-style: italic; }

  .block-actions { display: flex; gap: 4px; margin-left: auto; }
  .block-del {
    background: none;
    border: none;
    color: var(--textFaint);
    cursor: pointer;
    padding: 2px 5px;
    border-radius: 3px;
    font-size: 13px;
    transition: color 0.15s;
    line-height: 1;
  }
  .block-del:hover { color: var(--red); }

  .block-body {
    padding: 0;
  }
  .block-body textarea {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 16px;
    line-height: 1.75;
    padding: 12px 16px;
    resize: none;
    min-height: 72px;
  }
  .block-body textarea::placeholder { color: var(--textFaint); font-style: italic; }

  .add-block-row {
    display: flex;
    gap: 10px;
    margin-top: 8px;
  }

  /* CHARACTERS PANEL */
  .chars-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .chars-header h2 { font-family: var(--font-title); font-size: 16px; color: var(--gold2); letter-spacing: 0.1em; }
  .chars-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; max-width: 900px; }
  .char-card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .char-card-header { display: flex; align-items: center; justify-content: space-between; }
  .char-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--goldDark);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-title);
    font-size: 14px;
    color: var(--gold3);
    flex-shrink: 0;
  }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    display: none;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg2);
    border: 1px solid var(--borderGold);
    border-radius: 8px;
    padding: 28px;
    width: 420px;
    max-width: 92vw;
  }
  .modal h3 {
    font-family: var(--font-title);
    font-size: 15px;
    color: var(--gold2);
    letter-spacing: 0.1em;
    margin-bottom: 18px;
  }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }

  /* NOTIFICATION */
  .toast {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: var(--surface2);
    border: 1px solid var(--borderGold);
    border-radius: var(--radius);
    padding: 12px 18px;
    color: var(--gold2);
    font-family: var(--font-title);
    font-size: 12px;
    letter-spacing: 0.08em;
    z-index: 200;
    transform: translateY(20px);
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* EMPTY STATE */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    color: var(--textFaint);
    font-family: var(--font-title);
    font-size: 13px;
    letter-spacing: 0.1em;
    gap: 16px;
    text-align: center;
  }
  .empty-state svg { opacity: 0.3; }

  /* ORNAMENT */
  .section-ornament {
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--textFaint);
    font-size: 11px;
    font-family: var(--font-mono);
    letter-spacing: 0.12em;
    margin-bottom: 20px;
  }
  .section-ornament::before, .section-ornament::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--border), transparent);
  }

  /* NAME INPUT for chapters */
  .inline-input {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    outline: none;
    color: var(--gold2);
    font-family: var(--font-title);
    font-size: 13px;
    letter-spacing: 0.07em;
    padding: 2px 0;
    width: 200px;
    transition: border-color 0.15s;
  }
  .inline-input:focus { border-bottom-color: var(--goldDark); }

  /* Act name in header */
  .act-name-input {
    background: transparent;
    border: none;
    outline: none;
    color: var(--textMuted);
    font-family: var(--font-body);
    font-style: italic;
    font-size: 13px;
    flex: 1;
    padding: 0;
    transition: color 0.15s;
  }
  .act-name-input:focus { color: var(--text); }
  .act-name-input::placeholder { color: var(--textFaint); }

  /* back button */
  .back-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    color: var(--textFaint);
    cursor: pointer;
    font-family: var(--font-title);
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 0;
    margin-bottom: 20px;
    transition: color 0.15s;
  }
  .back-btn:hover { color: var(--gold2); }

  /* word count */
  .word-count {
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--textFaint);
    padding: 4px 16px 8px;
  }
</style>
</head>
<body>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <h1>DG/Books</h1>
      <p>EDITOR DE NOVEL</p>
    </div>

    <nav class="sidebar-nav">
      <button class="nav-btn active" data-panel="info" onclick="switchPanel('info')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="1" width="12" height="14" rx="2"/><line x1="5" y1="5" x2="11" y2="5"/><line x1="5" y1="8" x2="11" y2="8"/><line x1="5" y1="11" x2="8" y2="11"/></svg>
        OBRA
      </button>
      <button class="nav-btn" data-panel="chapters" onclick="switchPanel('chapters')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 3h12M2 6h8M2 9h10M2 12h6"/></svg>
        CAPÍTULOS
      </button>
      <button class="nav-btn" data-panel="characters" onclick="switchPanel('characters')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="5" r="3"/><path d="M2 14c0-3 2.7-5 6-5s6 2 6 5"/></svg>
        PERSONAGENS
      </button>
    </nav>

    <div class="sidebar-tree" id="sidebarTree"></div>

    <div class="sidebar-footer">
      <button class="export-btn" onclick="exportDGBooks()">
        ↓ &nbsp; EXPORTAR OBRA COMPLETA
      </button>
      <button class="export-btn secondary" onclick="openExportChaptersModal()">
        ↓ &nbsp; EXPORTAR CAPÍTULOS
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <!-- TOP BAR -->
    <div class="topbar">
      <span class="topbar-title" id="topbarTitle">INFORMAÇÕES DA OBRA</span>
      <div class="topbar-actions" id="topbarActions"></div>
    </div>

    <!-- PANELS -->
    <div class="panel active" id="panel-info">
      <div class="section-ornament">CAPA E DADOS</div>
      <div class="info-grid">
        <div class="cover-upload">
          <div class="cover-preview" id="coverPreview" onclick="document.getElementById('coverInput').click()">
            <span>+ CAPA</span>
          </div>
          <input type="file" id="coverInput" accept="image/*" onchange="loadCover(this)">
          <div style="display:flex;flex-direction:column;gap:14px;flex:1;">
            <div class="form-group">
              <label>TÍTULO DA OBRA</label>
              <input type="text" id="workTitle" placeholder="Nome da sua novel..." oninput="saveInfo()">
            </div>
            <div class="form-group">
              <label>AUTOR</label>
              <input type="text" id="workAuthor" placeholder="Seu nome..." oninput="saveInfo()">
            </div>
          </div>
        </div>

        <div class="form-group">
          <label>GÊNERO</label>
          <input type="text" id="workGenre" placeholder="Fantasia, Romance, Ação..." oninput="saveInfo()">
        </div>

        <div class="form-group">
          <label>EDITORA / EMPRESA</label>
          <div class="company-row" style="margin-bottom:8px;">
            <input type="checkbox" id="useDefaultCompany" checked onchange="toggleCompany()">
            <label for="useDefaultCompany">Usar DG/Books como editora</label>
          </div>
          <input type="text" id="workCompany" placeholder="Nome da empresa..." oninput="saveInfo()" disabled style="opacity:0.4;">
        </div>

        <div class="form-group" style="grid-column:1/-1;">
          <label>SINOPSE</label>
          <textarea id="workSynopsis" placeholder="Descreva brevemente a história..." rows="4" oninput="saveInfo()"></textarea>
        </div>
      </div>
    </div>

    <div class="panel" id="panel-chapters">
      <!-- Chapter list or act editor injected here -->
    </div>

    <div class="panel" id="panel-characters">
      <div class="chars-header">
        <h2>PERSONAGENS</h2>
        <button class="btn primary" onclick="openAddCharModal()">+ NOVO PERSONAGEM</button>
      </div>
      <p style="color:var(--textFaint);font-size:13px;margin-bottom:20px;font-family:var(--font-mono);">
        Registre os personagens para os créditos da obra.
      </p>
      <div class="chars-grid" id="charsGrid"></div>
    </div>
  </main>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="modalChapter">
  <div class="modal">
    <h3>NOVO CAPÍTULO</h3>
    <div class="form-group">
      <label>TÍTULO DO CAPÍTULO</label>
      <input type="text" id="newChapterTitle" placeholder="Ex: O Começo de Tudo..." style="width:100%;">
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('modalChapter')">Cancelar</button>
      <button class="btn primary" onclick="createChapter()">Criar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalAct">
  <div class="modal">
    <h3>NOVO ATO</h3>
    <div class="form-group">
      <label>TÍTULO DO ATO</label>
      <input type="text" id="newActTitle" placeholder="Ex: A Chegada...">
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('modalAct')">Cancelar</button>
      <button class="btn primary" onclick="createAct()">Criar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalChar">
  <div class="modal">
    <h3>PERSONAGEM</h3>
    <div style="display:flex;flex-direction:column;gap:12px;">
      <div class="form-group"><label>NOME</label><input type="text" id="charName" placeholder="Nome do personagem..."></div>
      <div class="form-group"><label>IDADE</label><input type="text" id="charAge" placeholder="Ex: 18 anos, desconhecida..."></div>
      <div class="form-group"><label>APARÊNCIA</label><textarea id="charAppearance" placeholder="Descreva cabelo, olhos, altura, traços..." rows="3"></textarea></div>
      <div class="form-group"><label>PAPEL NA HISTÓRIA</label><input type="text" id="charRole" placeholder="Protagonista, Antagonista, Coadjuvante..."></div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('modalChar')">Cancelar</button>
      <button class="btn primary" onclick="saveChar()">Salvar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalExportChapters">
  <div class="modal wide">
    <h3>EXPORTAR CAPÍTULOS</h3>
    <p style="font-size:13px;color:var(--textFaint);font-family:var(--font-mono);margin-bottom:16px;">
      Selecione os capítulos para exportar como arquivos <span style="color:var(--gold2);">.dgbooks</span> separados.
    </p>
    <div class="select-actions">
      <button class="select-all-btn" onclick="selectAllChapters(true)">SELECIONAR TUDO</button>
      <button class="select-all-btn" onclick="selectAllChapters(false)">LIMPAR SELEÇÃO</button>
    </div>
    <div class="chap-select-list" id="chapSelectList"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('modalExportChapters')">Cancelar</button>
      <button class="btn primary" onclick="exportSelectedChapters()">↓ Exportar Selecionados</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── STATE ────────────────────────────────────────────────────────────────────
let state = {
  info: { title:'', author:'', genre:'', synopsis:'', company:'', useDefault:true, coverData:null },
  chapters: [],
  characters: []
};

let currentPanel = 'info';
let currentChapterId = null;
let currentActId = null;
let editingCharIndex = -1;
let actForNewChapter = null;

// ─── UTILS ────────────────────────────────────────────────────────────────────
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2400);
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function openModal(id) { document.getElementById(id).classList.add('open'); }

// ─── PANEL SWITCH ─────────────────────────────────────────────────────────────
function switchPanel(name, chId, actId) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

  currentPanel = name;

  if (chId) currentChapterId = chId;
  if (actId) currentActId = actId;

  document.getElementById('panel-' + name).classList.add('active');
  document.querySelector(`.nav-btn[data-panel="${name}"]`)?.classList.add('active');

  if (name === 'chapters') renderChaptersPanel();
  if (name === 'characters') renderCharsPanel();

  updateTopbar();
  renderTree();
}

function updateTopbar() {
  const titles = { info:'INFORMAÇÕES DA OBRA', chapters:'CAPÍTULOS', characters:'PERSONAGENS' };
  const actions = { info:'', chapters:'', characters:'' };

  let title = titles[currentPanel] || '';
  let actHtml = '';

  if (currentPanel === 'chapters') {
    if (currentActId) {
      const ch = state.chapters.find(c => c.id === currentChapterId);
      const act = ch?.acts.find(a => a.id === currentActId);
      title = `${ch?.title || ''} › ${act?.title || 'Ato'}`;
      actHtml = `<button class="btn small" onclick="addBlock('narrator')">+ Narração</button>
                 <button class="btn small primary" onclick="addBlock('character')">+ Fala de Personagem</button>`;
    } else if (currentChapterId) {
      const ch = state.chapters.find(c => c.id === currentChapterId);
      title = ch?.title || 'Capítulo';
      actHtml = `<button class="btn small primary" onclick="openAddActModal('${currentChapterId}')">+ Novo Ato</button>`;
    } else {
      actHtml = `<button class="btn primary" onclick="openModal('modalChapter')">+ Novo Capítulo</button>`;
    }
  }
  if (currentPanel === 'characters') {
    actHtml = `<button class="btn primary" onclick="openAddCharModal()">+ Novo Personagem</button>`;
  }

  document.getElementById('topbarTitle').textContent = title;
  document.getElementById('topbarActions').innerHTML = actHtml;
}

// ─── TREE ─────────────────────────────────────────────────────────────────────
function renderTree() {
  const el = document.getElementById('sidebarTree');
  if (!state.chapters.length) { el.innerHTML = ''; return; }

  el.innerHTML = state.chapters.map(ch => {
    const isChOpen = currentChapterId === ch.id;
    return `
    <div class="tree-chapter">
      <div class="tree-chapter-header ${isChOpen ? 'active':''}" onclick="openChapter('${ch.id}')">
        <span class="toggle">${isChOpen ? '▾':'▸'}</span>
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${ch.title || 'Sem título'}</span>
      </div>
      ${isChOpen ? `<div class="tree-acts">
        ${ch.acts.map((a,i) => `
          <div class="tree-act ${currentActId===a.id?'active':''}" onclick="openAct('${ch.id}','${a.id}')">
            <span style="font-size:9px;font-family:var(--font-mono);color:var(--textFaint);">ATO ${i+1}</span>
            <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;">${a.title||'Sem título'}</span>
          </div>
        `).join('')}
      </div>` : ''}
    </div>`;
  }).join('');
}

// ─── INFO ─────────────────────────────────────────────────────────────────────
function saveInfo() {
  state.info.title = document.getElementById('workTitle').value;
  state.info.author = document.getElementById('workAuthor').value;
  state.info.genre = document.getElementById('workGenre').value;
  state.info.synopsis = document.getElementById('workSynopsis').value;
  state.info.company = document.getElementById('workCompany').value;
}

function toggleCompany() {
  const cb = document.getElementById('useDefaultCompany');
  const inp = document.getElementById('workCompany');
  state.info.useDefault = cb.checked;
  inp.disabled = cb.checked;
  inp.style.opacity = cb.checked ? '0.4' : '1';
  if (cb.checked) inp.value = '';
}

function loadCover(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    state.info.coverData = e.target.result;
    const prev = document.getElementById('coverPreview');
    prev.innerHTML = `<img src="${e.target.result}">`;
  };
  reader.readAsDataURL(file);
}

// ─── CHAPTERS ─────────────────────────────────────────────────────────────────
function openAddActModal(chId) {
  actForNewChapter = chId;
  document.getElementById('newActTitle').value = '';
  openModal('modalAct');
}

function createChapter() {
  const title = document.getElementById('newChapterTitle').value.trim() || 'Capítulo Sem Título';
  state.chapters.push({ id: uid(), title, acts: [] });
  closeModal('modalChapter');
  document.getElementById('newChapterTitle').value = '';
  renderChaptersPanel();
  renderTree();
  toast('Capítulo criado!');
}

function createAct() {
  const title = document.getElementById('newActTitle').value.trim() || 'Ato Sem Título';
  const ch = state.chapters.find(c => c.id === (actForNewChapter || currentChapterId));
  if (!ch) return;
  ch.acts.push({ id: uid(), title, blocks: [] });
  closeModal('modalAct');
  document.getElementById('newActTitle').value = '';
  renderChaptersPanel();
  renderTree();
  toast('Ato criado!');
}

function openChapter(chId) {
  currentChapterId = chId;
  currentActId = null;
  renderChaptersPanel();
  updateTopbar();
  renderTree();
}

function openAct(chId, actId) {
  currentChapterId = chId;
  currentActId = actId;
  renderChaptersPanel();
  updateTopbar();
  renderTree();
}

function deleteChapter(chId, e) {
  e.stopPropagation();
  if (!confirm('Deletar este capítulo e todos os seus atos?')) return;
  state.chapters = state.chapters.filter(c => c.id !== chId);
  if (currentChapterId === chId) { currentChapterId = null; currentActId = null; }
  renderChaptersPanel();
  renderTree();
  updateTopbar();
  toast('Capítulo removido.');
}

function deleteAct(chId, actId, e) {
  e.stopPropagation();
  if (!confirm('Deletar este ato?')) return;
  const ch = state.chapters.find(c => c.id === chId);
  ch.acts = ch.acts.filter(a => a.id !== actId);
  if (currentActId === actId) currentActId = null;
  renderChaptersPanel();
  renderTree();
  updateTopbar();
  toast('Ato removido.');
}

function renderChaptersPanel() {
  const panel = document.getElementById('panel-chapters');

  if (currentActId) {
    renderActEditor(panel);
    return;
  }

  if (currentChapterId) {
    renderChapterDetail(panel);
    return;
  }

  // Chapter list
  if (!state.chapters.length) {
    panel.innerHTML = `
      <div class="chapter-header">
        <h2>CAPÍTULOS</h2>
        <button class="btn primary" onclick="openModal('modalChapter')">+ Novo Capítulo</button>
      </div>
      <div class="empty-state">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="8" y="4" width="32" height="40" rx="4"/><line x1="16" y1="14" x2="32" y2="14"/><line x1="16" y1="20" x2="32" y2="20"/><line x1="16" y1="26" x2="24" y2="26"/></svg>
        Nenhum capítulo ainda.<br>Crie o primeiro capítulo da sua novel.
      </div>`;
    return;
  }

  panel.innerHTML = `
    <div class="chapter-header">
      <h2>CAPÍTULOS</h2>
      <button class="btn primary" onclick="openModal('modalChapter')">+ Novo Capítulo</button>
    </div>
    <div class="chapters-list" id="chaptersList"></div>`;

  const list = document.getElementById('chaptersList');
  state.chapters.forEach((ch, ci) => {
    const card = document.createElement('div');
    card.className = 'chapter-card';
    card.innerHTML = `
      <div class="chapter-card-header" onclick="openChapter('${ch.id}')">
        <div class="chapter-card-title">
          <span class="chapter-num">CAP ${ci+1}</span>
          <span>${ch.title}</span>
        </div>
        <div style="display:flex;gap:6px;align-items:center;">
          <span style="font-size:11px;font-family:var(--font-mono);color:var(--textFaint);">${ch.acts.length} ato${ch.acts.length!==1?'s':''}</span>
          <button class="btn small danger" onclick="deleteChapter('${ch.id}',event)">✕</button>
        </div>
      </div>`;
    list.appendChild(card);
  });
}

function renderChapterDetail(panel) {
  const ch = state.chapters.find(c => c.id === currentChapterId);
  if (!ch) { currentChapterId = null; renderChaptersPanel(); return; }

  const chIdx = state.chapters.indexOf(ch);

  panel.innerHTML = `
    <button class="back-btn" onclick="currentChapterId=null;currentActId=null;renderChaptersPanel();updateTopbar();renderTree();">
      ← Voltar para Capítulos
    </button>
    <div class="section-ornament">CAPÍTULO ${chIdx+1}</div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:22px;">
      <input class="inline-input" value="${ch.title}" onchange="ch_title_change(event,'${ch.id}')" style="width:320px;font-size:16px;" placeholder="Título do capítulo...">
      <button class="btn small" onclick="exportSingleChapter('${ch.id}')" title="Exportar apenas este capítulo" style="margin-left:auto;">↓ Exportar Capítulo</button>
    </div>
    <div class="chapter-header" style="margin-bottom:16px;">
      <h2 style="font-size:13px;">ATOS</h2>
      <button class="btn primary" onclick="openAddActModal('${ch.id}')">+ Novo Ato</button>
    </div>
    <div class="acts-list" id="actsList">
    ${ch.acts.length === 0 ? `<div class="empty-state" style="padding:40px 0;"><span>Nenhum ato ainda. Crie o primeiro ato.</span></div>` :
      ch.acts.map((a,ai) => {
        const preview = a.blocks.map(b => b.type==='character'?`[${b.charName||'?'}] ${b.text||''}`:b.text||'').join(' ').slice(0,80);
        return `
        <div class="act-item" onclick="openAct('${ch.id}','${a.id}')">
          <span class="act-badge">ATO ${ai+1}</span>
          <span style="flex:0 0 auto;font-family:var(--font-title);font-size:12px;color:var(--textMuted);">${a.title}</span>
          <span class="act-preview">${preview || 'Vazio...'}</span>
          <button class="btn small danger" onclick="deleteAct('${ch.id}','${a.id}',event)">✕</button>
        </div>`;
      }).join('')
    }
    </div>`;
}

function ch_title_change(e, chId) {
  const ch = state.chapters.find(c => c.id === chId);
  if (ch) { ch.title = e.target.value; renderTree(); }
}

// ─── ACT EDITOR ───────────────────────────────────────────────────────────────
function renderActEditor(panel) {
  const ch = state.chapters.find(c => c.id === currentChapterId);
  const act = ch?.acts.find(a => a.id === currentActId);
  if (!act) return;

  const chIdx = state.chapters.indexOf(ch);
  const actIdx = ch.acts.indexOf(act);

  const blocksHtml = act.blocks.map((b, bi) => renderBlock(b, bi)).join('');
  const wordCount = act.blocks.map(b=>b.text||'').join(' ').split(/\s+/).filter(Boolean).length;

  panel.innerHTML = `
    <button class="back-btn" onclick="currentActId=null;renderChaptersPanel();updateTopbar();renderTree();">
      ← Voltar para ${ch.title}
    </button>
    <div class="act-editor">
      <div class="act-editor-header">
        <h2>ATO ${actIdx+1} — <input class="inline-input" value="${act.title}" onchange="act_title_change(event,'${ch.id}','${act.id}')" placeholder="Título do ato..."></h2>
        <p>Cap. ${chIdx+1}: ${ch.title} &nbsp;·&nbsp; ${wordCount} palavra${wordCount!==1?'s':''}</p>
      </div>

      <div class="blocks-list" id="blocksList">
        ${blocksHtml || `<div class="empty-state" style="padding:32px 0;">Nenhum bloco ainda. Use os botões abaixo para começar.</div>`}
      </div>

      <div class="add-block-row">
        <button class="btn" onclick="addBlock('narrator')">+ Narração</button>
        <button class="btn primary" onclick="addBlock('character')">+ Fala de Personagem</button>
      </div>
    </div>`;
}

function renderBlock(b, bi) {
  if (b.type === 'narrator') {
    return `
    <div class="block narrator" id="block-${b.id}">
      <div class="block-header">
        <span class="block-type-badge narrator">Narração</span>
        <div class="block-actions">
          <button class="block-del" onclick="deleteBlock('${b.id}')" title="Remover">✕</button>
        </div>
      </div>
      <div class="block-body">
        <textarea placeholder="Escreva a narração aqui..." oninput="updateBlock('${b.id}','text',this.value);autoResize(this)">${b.text||''}</textarea>
      </div>
    </div>`;
  }
  return `
  <div class="block character" id="block-${b.id}">
    <div class="block-header">
      <span class="block-type-badge character">Fala</span>
      <div class="block-char-name">
        <input type="text" placeholder="Nome do personagem..." value="${b.charName||''}" oninput="updateBlock('${b.id}','charName',this.value)">
      </div>
      <div class="block-actions">
        <button class="block-del" onclick="deleteBlock('${b.id}')" title="Remover">✕</button>
      </div>
    </div>
    <div class="block-body">
      <textarea placeholder="Fala do personagem..." oninput="updateBlock('${b.id}','text',this.value);autoResize(this)">${b.text||''}</textarea>
    </div>
  </div>`;
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = (el.scrollHeight) + 'px';
}

function act_title_change(e, chId, actId) {
  const ch = state.chapters.find(c => c.id === chId);
  const act = ch?.acts.find(a => a.id === actId);
  if (act) { act.title = e.target.value; renderTree(); }
}

function addBlock(type) {
  const ch = state.chapters.find(c => c.id === currentChapterId);
  const act = ch?.acts.find(a => a.id === currentActId);
  if (!act) return;
  act.blocks.push({ id: uid(), type, text: '', charName: '' });
  renderActEditor(document.getElementById('panel-chapters'));
  // scroll to bottom
  setTimeout(() => {
    const list = document.getElementById('blocksList');
    if (list) { const blocks = list.querySelectorAll('.block'); if(blocks.length) blocks[blocks.length-1].scrollIntoView({behavior:'smooth',block:'nearest'}); }
    // autoResize all textareas
    document.querySelectorAll('.block-body textarea').forEach(autoResize);
  }, 50);
}

function updateBlock(blockId, field, value) {
  const ch = state.chapters.find(c => c.id === currentChapterId);
  const act = ch?.acts.find(a => a.id === currentActId);
  const block = act?.blocks.find(b => b.id === blockId);
  if (block) block[field] = value;
  // update word count
  const wordCount = act.blocks.map(b=>b.text||'').join(' ').split(/\s+/).filter(Boolean).length;
  const header = document.querySelector('.act-editor-header p');
  if (header) {
    const chIdx = state.chapters.indexOf(ch);
    header.textContent = `Cap. ${chIdx+1}: ${ch.title} · ${wordCount} palavra${wordCount!==1?'s':''}`;
  }
}

function deleteBlock(blockId) {
  const ch = state.chapters.find(c => c.id === currentChapterId);
  const act = ch?.acts.find(a => a.id === currentActId);
  if (!act) return;
  act.blocks = act.blocks.filter(b => b.id !== blockId);
  renderActEditor(document.getElementById('panel-chapters'));
}

// ─── CHARACTERS ───────────────────────────────────────────────────────────────
function openAddCharModal() {
  editingCharIndex = -1;
  document.getElementById('charName').value = '';
  document.getElementById('charAge').value = '';
  document.getElementById('charAppearance').value = '';
  document.getElementById('charRole').value = '';
  openModal('modalChar');
}

function saveChar() {
  const name = document.getElementById('charName').value.trim();
  if (!name) { toast('Informe o nome do personagem!'); return; }
  const char = {
    name,
    age: document.getElementById('charAge').value.trim(),
    appearance: document.getElementById('charAppearance').value.trim(),
    role: document.getElementById('charRole').value.trim()
  };
  if (editingCharIndex >= 0) state.characters[editingCharIndex] = char;
  else state.characters.push(char);
  closeModal('modalChar');
  renderCharsPanel();
  toast(`Personagem ${name} salvo!`);
}

function editChar(i) {
  editingCharIndex = i;
  const c = state.characters[i];
  document.getElementById('charName').value = c.name;
  document.getElementById('charAge').value = c.age;
  document.getElementById('charAppearance').value = c.appearance;
  document.getElementById('charRole').value = c.role;
  openModal('modalChar');
}

function deleteChar(i) {
  if (!confirm('Remover este personagem?')) return;
  state.characters.splice(i, 1);
  renderCharsPanel();
  toast('Personagem removido.');
}

function renderCharsPanel() {
  const grid = document.getElementById('charsGrid');
  if (!grid) return;

  if (!state.characters.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;padding:40px 0;">Nenhum personagem cadastrado.</div>`;
    return;
  }

  grid.innerHTML = state.characters.map((c,i) => {
    const initials = c.name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
    return `
    <div class="char-card">
      <div class="char-card-header">
        <div style="display:flex;align-items:center;gap:10px;">
          <div class="char-avatar">${initials}</div>
          <div>
            <div style="font-family:var(--font-title);font-size:13px;color:var(--gold2);">${c.name}</div>
            <div style="font-size:12px;color:var(--textFaint);">${c.role||'Sem papel definido'}</div>
          </div>
        </div>
        <div style="display:flex;gap:4px;">
          <button class="btn small" onclick="editChar(${i})">✎</button>
          <button class="btn small danger" onclick="deleteChar(${i})">✕</button>
        </div>
      </div>
      ${c.age ? `<div style="font-size:13px;color:var(--textMuted);"><span style="color:var(--textFaint);font-family:var(--font-mono);font-size:10px;">IDADE</span> ${c.age}</div>` : ''}
      ${c.appearance ? `<div style="font-size:13px;color:var(--textMuted);line-height:1.5;"><span style="display:block;color:var(--textFaint);font-family:var(--font-mono);font-size:10px;margin-bottom:2px;">APARÊNCIA</span>${c.appearance}</div>` : ''}
    </div>`;
  }).join('');
}

// ─── EXPORT .dgbooks ──────────────────────────────────────────────────────────
async function exportDGBooks() {
  if (!state.info.title) { toast('Informe o título da obra antes de exportar!'); return; }
  if (!state.chapters.length) { toast('Adicione pelo menos um capítulo!'); return; }

  const zip = new JSZip();

  // Characters file
  const charLines = state.characters.map((c,i) => {
    let lines = [`[PERSONAGEM ${i+1}]`, `Nome: ${c.name}`];
    if (c.age) lines.push(`Idade: ${c.age}`);
    if (c.appearance) lines.push(`Aparência: ${c.appearance}`);
    if (c.role) lines.push(`Papel: ${c.role}`);
    return lines.join('\n');
  }).join('\n\n---\n\n');

  zip.file('personagens.personagens', charLines || '(Nenhum personagem cadastrado)');

  // Info file
  const company = state.info.useDefault ? 'DG/Books' : (state.info.company || 'DG/Books');
  const infoText = [
    `OBRA: ${state.info.title}`,
    `AUTOR: ${state.info.author || 'Desconhecido'}`,
    `EDITORA: ${company}`,
    state.info.genre ? `GÊNERO: ${state.info.genre}` : '',
    '',
    'SINOPSE:',
    state.info.synopsis || '(Sem sinopse)'
  ].filter(l => l !== null).join('\n');

  zip.file('info.txt', infoText);

  // Cover image
  if (state.info.coverData) {
    const b64 = state.info.coverData.split(',')[1];
    const ext = state.info.coverData.includes('png') ? 'png' : state.info.coverData.includes('webp') ? 'webp' : 'jpg';
    zip.file(`cover.${ext}`, b64, { base64: true });
  }

  // Chapters
  state.chapters.forEach((ch, ci) => {
    const chFolder = zip.folder(`capitulo_${ci+1}_${sanitize(ch.title)}`);

    ch.acts.forEach((act, ai) => {
      const actFolder = chFolder.folder(`ato_${ai+1}_${sanitize(act.title)}`);

      const content = act.blocks.map(b => {
        if (b.type === 'narrator') return b.text || '';
        return `${b.charName || 'PERSONAGEM'}: ${b.text || ''}`;
      }).join('\n\n');

      actFolder.file(`ato${ai+1}.ato${ai+1}`, content || '(Ato vazio)');
    });
  });

  // Generate and download
  const blob = await zip.generateAsync({ type: 'blob' });
  const filename = `${sanitize(state.info.title)}.dgbooks`;
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
  toast(`${filename} exportado com sucesso!`);
}

// ─── EXPORT INDIVIDUAL CHAPTERS ───────────────────────────────────────────────
function openExportChaptersModal() {
  if (!state.chapters.length) { toast('Nenhum capítulo para exportar!'); return; }
  const list = document.getElementById('chapSelectList');
  list.innerHTML = state.chapters.map((ch, ci) => {
    const acts = ch.acts.length;
    const words = ch.acts.flatMap(a => a.blocks).map(b => b.text||'').join(' ').split(/\s+/).filter(Boolean).length;
    return `
    <div class="chap-select-item" id="csi-${ch.id}" onclick="toggleChapSelect('${ch.id}')">
      <input type="checkbox" id="chk-${ch.id}" onclick="event.stopPropagation();toggleChapSelect('${ch.id}')">
      <label for="chk-${ch.id}" onclick="event.preventDefault()">
        <span class="csi-num">CAP ${ci+1}</span>
        <span class="csi-title">${ch.title}</span>
        <span class="csi-meta">${acts} ato${acts!==1?'s':''} &nbsp;·&nbsp; ${words} palavra${words!==1?'s':''}</span>
      </label>
    </div>`;
  }).join('');
  openModal('modalExportChapters');
}

function toggleChapSelect(chId) {
  const item = document.getElementById('csi-' + chId);
  const chk  = document.getElementById('chk-'  + chId);
  if (!item || !chk) return;
  const isSelected = item.classList.toggle('selected');
  chk.checked = isSelected;
}

function selectAllChapters(val) {
  state.chapters.forEach(ch => {
    const item = document.getElementById('csi-' + ch.id);
    const chk  = document.getElementById('chk-' + ch.id);
    if (item && chk) { chk.checked = val; item.classList.toggle('selected', val); }
  });
}

async function exportSelectedChapters() {
  const selected = state.chapters.filter(ch => {
    const chk = document.getElementById('chk-' + ch.id);
    return chk && chk.checked;
  });
  if (!selected.length) { toast('Selecione ao menos um capítulo!'); return; }
  closeModal('modalExportChapters');
  if (selected.length === 1) { await exportSingleChapter(selected[0].id); return; }
  toast(`Exportando ${selected.length} capítulos...`);
  for (let i = 0; i < selected.length; i++) {
    await exportSingleChapter(selected[i].id, true);
    if (i < selected.length - 1) await sleep(420);
  }
  toast(`${selected.length} capítulos exportados!`);
}

async function exportSingleChapter(chId, silent = false) {
  const ch = state.chapters.find(c => c.id === chId);
  if (!ch) return;
  const ci = state.chapters.indexOf(ch);
  const company = state.info.useDefault ? 'DG/Books' : (state.info.company || 'DG/Books');
  const zip = new JSZip();

  // info
  const infoText = [
    `OBRA: ${state.info.title || 'Sem título'}`,
    `CAPÍTULO: ${ci+1} — ${ch.title}`,
    `AUTOR: ${state.info.author || 'Desconhecido'}`,
    `EDITORA: ${company}`,
    state.info.genre ? `GÊNERO: ${state.info.genre}` : '',
    '', 'SINOPSE:', state.info.synopsis || '(Sem sinopse)'
  ].filter(l => l !== null).join('\n');
  zip.file('info.txt', infoText);

  // characters
  const charLines = state.characters.map((c,i) => {
    let lines = [`[PERSONAGEM ${i+1}]`, `Nome: ${c.name}`];
    if (c.age) lines.push(`Idade: ${c.age}`);
    if (c.appearance) lines.push(`Aparência: ${c.appearance}`);
    if (c.role) lines.push(`Papel: ${c.role}`);
    return lines.join('\n');
  }).join('\n\n---\n\n');
  zip.file('personagens.personagens', charLines || '(Nenhum personagem cadastrado)');

  // cover
  if (state.info.coverData) {
    const b64 = state.info.coverData.split(',')[1];
    const ext = state.info.coverData.includes('png') ? 'png' : state.info.coverData.includes('webp') ? 'webp' : 'jpg';
    zip.file(`cover.${ext}`, b64, { base64: true });
  }

  // chapter folder
  const chFolder = zip.folder(`capitulo_${ci+1}_${sanitize(ch.title)}`);
  ch.acts.forEach((act, ai) => {
    const actFolder = chFolder.folder(`ato_${ai+1}_${sanitize(act.title)}`);
    const content = act.blocks.map(b =>
      b.type === 'narrator' ? (b.text||'') : `${b.charName||'PERSONAGEM'}: ${b.text||''}`
    ).join('\n\n');
    actFolder.file(`ato${ai+1}.ato${ai+1}`, content || '(Ato vazio)');
  });

  const blob = await zip.generateAsync({ type: 'blob' });
  const workSlug = sanitize(state.info.title || 'obra');
  const chapSlug = sanitize(ch.title);
  const filename = `${workSlug}_cap${ci+1}_${chapSlug}.dgbooks`;
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
  if (!silent) toast(`Capítulo ${ci+1} exportado!`);
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function sanitize(str) {
  return (str||'sem-titulo').toLowerCase().replace(/[^a-z0-9\u00c0-\u017f]+/gi, '_').replace(/_{2,}/g,'_').replace(/^_|_$/g,'');
}

// ─── KEYBOARD SHORTCUTS ───────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-overlay.open').forEach(m => m.classList.remove('open'));
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter' && currentActId) {
    addBlock('narrator');
  }
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderCharsPanel();
renderTree();
</script>
