<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Leitor DGBooks</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600&family=Merriweather:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-page: #f9f6ef;
            --surface: #ffffff;
            --text-primary: #2c2418;
            --text-secondary: #5a4a3a;
            --accent: #b87c4f;
            --accent-soft: #e6d5c3;
            --border-light: #e2d6ca;
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.05);
            --header-bg: #fffbf5;
        }

        body.dark {
            --bg-page: #121212;
            --surface: #1e1e1e;
            --text-primary: #ececec;
            --text-secondary: #b0b0b0;
            --accent: #e2b87a;
            --accent-soft: #2e2a24;
            --border-light: #3a3a3a;
            --header-bg: #1a1a1a;
        }

        body {
            background-color: var(--bg-page);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            transition: background 0.2s, color 0.2s;
            line-height: 1.5;
        }

        .app-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px 40px;
        }

        .reader-header {
            background: var(--header-bg);
            border-bottom: 2px solid var(--accent-soft);
            padding: 20px 0;
            margin-bottom: 30px;
            border-radius: 0 0 24px 24px;
            box-shadow: var(--shadow-sm);
        }

        .header-inner {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }

        .logo h1 {
            font-family: 'Merriweather', serif;
            font-size: 1.7rem;
            color: var(--accent);
        }

        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .btn {
            background: transparent;
            border: 1px solid var(--accent);
            padding: 8px 18px;
            border-radius: 60px;
            font-weight: 500;
            cursor: pointer;
            color: var(--accent);
            font-size: 0.85rem;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: var(--accent);
            color: #1e1a14;
            border: none;
        }

        .btn-primary:hover {
            background: #a05e32;
            color: white;
        }

        .btn-outline:hover {
            background: var(--accent-soft);
            color: var(--text-primary);
        }

        .import-hero {
            background: var(--surface);
            border-radius: 32px;
            padding: 48px 24px;
            text-align: center;
            border: 1px dashed var(--accent);
            margin: 20px 0;
        }

        .drop-zone {
            border: 2px dashed var(--accent-soft);
            border-radius: 28px;
            padding: 40px 20px;
            cursor: pointer;
        }

        .drop-zone:hover {
            background: var(--accent-soft);
        }

        .book-container {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px);}
            to { opacity: 1; transform: translateY(0);}
        }

        .metadata-panel {
            background: var(--surface);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 32px;
            display: flex;
            flex-wrap: wrap;
            gap: 28px;
            border: 1px solid var(--border-light);
        }

        .cover-box img {
            max-width: 130px;
            max-height: 180px;
            border-radius: 16px;
            object-fit: cover;
            border: 2px solid var(--accent);
        }

        .info-box {
            flex: 1;
        }

        .info-box h2 {
            font-family: 'Merriweather', serif;
            color: var(--accent);
            margin-bottom: 8px;
        }

        .genre-badge {
            background: var(--accent-soft);
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            display: inline-block;
            margin-right: 6px;
            margin-top: 6px;
        }

        .reader-toolbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            background: var(--surface);
            padding: 12px 20px;
            border-radius: 60px;
            margin-bottom: 28px;
            gap: 12px;
            border: 1px solid var(--border-light);
        }

        .nav-controls {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .font-controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .theme-toggle {
            background: var(--accent-soft);
            border-radius: 40px;
            padding: 6px 12px;
            cursor: pointer;
        }

        /* Página do Ato - estilo de livro */
        .act-page {
            background: var(--surface);
            border-radius: 32px;
            padding: 40px 36px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
            min-height: 70vh;
            display: flex;
            flex-direction: column;
        }

        .act-title-page {
            font-family: 'Merriweather', serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
            border-left: 5px solid var(--accent);
            padding-left: 20px;
            margin-bottom: 32px;
        }

        .act-content-page {
            font-size: 1rem;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-word;
            font-family: 'Inter', serif;
            color: var(--text-primary);
            flex: 1;
        }

        .act-footer-nav {
            margin-top: 48px;
            display: flex;
            justify-content: space-between;
            border-top: 1px solid var(--border-light);
            padding-top: 24px;
        }

        .page-indicator {
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 20px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: var(--surface);
            max-width: 500px;
            width: 90%;
            border-radius: 32px;
            padding: 24px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .toc-list {
            list-style: none;
            margin-top: 16px;
        }

        .toc-list li {
            padding: 12px;
            border-bottom: 1px solid var(--border-light);
            cursor: pointer;
        }

        .toc-list li:hover {
            background: var(--accent-soft);
            border-radius: 24px;
        }

        .close-modal {
            float: right;
            font-size: 28px;
            cursor: pointer;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        @media (max-width: 760px) {
            .act-page {
                padding: 24px 20px;
            }
            .act-title-page {
                font-size: 1.6rem;
            }
            .metadata-panel {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
        }

        /* Estilo para impressão / PDF: cada ato em nova página, sem rodapé */
        @media print {
            .reader-header, .reader-toolbar, .import-hero, .btn, .modal, footer, .action-buttons, .theme-toggle, .font-controls, .nav-controls {
                display: none !important;
            }
            .book-container {
                display: block !important;
            }
            .metadata-panel {
                break-inside: avoid;
            }
            .act-page {
                break-before: page;
                page-break-before: always;
                margin: 0;
                padding: 1.5cm;
                box-shadow: none;
                border: none;
                background: white;
            }
            .act-page:first-of-type {
                break-before: avoid;
            }
            body, body.dark {
                background: white;
                --surface: white;
                --text-primary: black;
            }
            .act-content-page {
                color: black;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="reader-header">
        <div class="header-inner">
            <div class="logo">
                <h1>📖 Leitor</h1>
                <p>Leia livros oficais DG</p>
            </div>
            <div class="action-buttons">
                <button class="btn btn-outline" id="openAnotherBtn">📂 Abrir outro</button>
                <button class="btn btn-outline" id="exportTxtBtn">📄 Exportar TXT</button>
                <button class="btn btn-primary" id="printPdfBtn">🖨️ Salvar PDF</button>
            </div>
        </div>
    </div>

    <div id="importArea" class="import-hero">
        <div class="drop-zone" id="dropZone">
            <h3>📚 Carregue seu arquivo .dgbooks</h3>
            <p style="margin: 12px 0;">Clique ou arraste</p>
            <input type="file" id="fileInput" accept=".dgbooks" style="display: none;">
            <button class="btn btn-primary" id="selectFileBtn">Selecionar arquivo</button>
        </div>
    </div>

    <div id="bookContainer" class="book-container">
        <div class="metadata-panel" id="metadataPanel"></div>

        <div class="reader-toolbar">
            <div class="nav-controls">
                <button class="btn" id="prevChapterBtn">◀ Capítulo ant.</button>
                <span id="chapterCounter" style="font-weight:500;">Capítulo 0 / 0</span>
                <button class="btn" id="nextChapterBtn">Próximo capítulo ▶</button>
                <button class="btn" id="prevActBtn">◀ Ato anterior</button>
                <span id="actCounter" style="font-weight:500;">Ato 0 / 0</span>
                <button class="btn" id="nextActBtn">Próximo ato ▶</button>
                <button class="btn" id="tocBtn">📑 Índice</button>
            </div>
            <div class="font-controls">
                <button class="btn" id="fontMinusBtn">A-</button>
                <span id="fontSizeLabel">100%</span>
                <button class="btn" id="fontPlusBtn">A+</button>
                <div class="theme-toggle" id="themeToggleBtn">🌓 Modo</div>
            </div>
        </div>

        <!-- Página do Ato atual -->
        <div id="actPageContainer" class="act-page">
            <div class="act-title-page" id="actTitle"></div>
            <div class="act-content-page" id="actContent"></div>
            <div class="act-footer-nav">
                <span></span>
                <span class="page-indicator" id="actPageIndicator"></span>
                <span></span>
            </div>
        </div>
    </div>
    <footer>Leitor de livros oficiais DGBooks</footer>
</div>

<div id="tocModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" id="closeModalBtn">&times;</span>
        <h3>📖 Sumário</h3>
        <ul class="toc-list" id="tocList"></ul>
    </div>
</div>

<script>
    // ---------- ESTADO GLOBAL ----------
    let currentBook = null;
    let currentChapterIndex = 0;
    let currentActIndex = 0;      // índice do ato dentro do capítulo atual
    let fontSizePercent = 100;
    let currentTheme = 'light';

    // Elementos DOM
    const importArea = document.getElementById('importArea');
    const bookContainer = document.getElementById('bookContainer');
    const metadataPanel = document.getElementById('metadataPanel');
    const chapterCounterSpan = document.getElementById('chapterCounter');
    const actCounterSpan = document.getElementById('actCounter');
    const prevChapterBtn = document.getElementById('prevChapterBtn');
    const nextChapterBtn = document.getElementById('nextChapterBtn');
    const prevActBtn = document.getElementById('prevActBtn');
    const nextActBtn = document.getElementById('nextActBtn');
    const tocBtn = document.getElementById('tocBtn');
    const tocModal = document.getElementById('tocModal');
    const tocList = document.getElementById('tocList');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const fontMinus = document.getElementById('fontMinusBtn');
    const fontPlus = document.getElementById('fontPlusBtn');
    const fontSizeLabel = document.getElementById('fontSizeLabel');
    const themeToggle = document.getElementById('themeToggleBtn');
    const exportTxt = document.getElementById('exportTxtBtn');
    const printPdf = document.getElementById('printPdfBtn');
    const openAnother = document.getElementById('openAnotherBtn');
    const selectFileBtn = document.getElementById('selectFileBtn');
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const actTitleEl = document.getElementById('actTitle');
    const actContentEl = document.getElementById('actContent');
    const actPageIndicator = document.getElementById('actPageIndicator');

    // Helpers
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]);
    }

    function formatContentWithBreaks(text) {
        if (!text) return '';
        return escapeHtml(text).replace(/\n/g, '<br>');
    }

    function applyFontSize() {
        if (actContentEl) actContentEl.style.fontSize = `${fontSizePercent}%`;
        fontSizeLabel.innerText = `${fontSizePercent}%`;
    }

    function increaseFont() { if (fontSizePercent < 180) { fontSizePercent += 10; applyFontSize(); saveFontPreference(); } }
    function decreaseFont() { if (fontSizePercent > 70) { fontSizePercent -= 10; applyFontSize(); saveFontPreference(); } }

    function toggleTheme() {
        if (currentTheme === 'light') {
            document.body.classList.add('dark');
            currentTheme = 'dark';
        } else {
            document.body.classList.remove('dark');
            currentTheme = 'light';
        }
        localStorage.setItem('reader_theme', currentTheme);
    }

    function loadPreferences() {
        const savedTheme = localStorage.getItem('reader_theme');
        if (savedTheme === 'dark') { document.body.classList.add('dark'); currentTheme = 'dark'; }
        const savedFont = localStorage.getItem('reader_fontSize');
        if (savedFont) { fontSizePercent = parseInt(savedFont); if (isNaN(fontSizePercent)) fontSizePercent = 100; applyFontSize(); }
    }
    function saveFontPreference() { localStorage.setItem('reader_fontSize', fontSizePercent); }

    // Renderiza metadados e capa
    function renderMetadata(book) {
        if (!book) return;
        const companyName = (book.company === 'custom' && book.customCompany) ? book.customCompany : (book.company === 'DG/ Books' ? 'DG/ Books' : book.company);
        let coverHtml = '';
        if (book.coverBase64) coverHtml = `<img src="${book.coverBase64}" alt="Capa">`;
        else coverHtml = `<div style="width:130px; height:180px; background: var(--accent-soft); border-radius:16px; display:flex; align-items:center; justify-content:center;">📘 sem capa</div>`;
        const genresHtml = (book.genres || []).map(g => `<span class="genre-badge">${escapeHtml(g)}</span>`).join('');
        const contributorsHtml = (book.contributors || []).map(c => `<span class="genre-badge">👤 ${escapeHtml(c)}</span>`).join('');
        metadataPanel.innerHTML = `
            <div class="cover-box">${coverHtml}</div>
            <div class="info-box">
                <h2>${escapeHtml(book.title || 'Sem título')}</h2>
                <p><strong>✍️ Autor:</strong> ${escapeHtml(book.author || 'Desconhecido')}</p>
                <p><strong>🏢 Selo:</strong> ${escapeHtml(companyName)}</p>
                <p><strong>🔖 Gêneros:</strong></p>
                <div>${genresHtml || '—'}</div>
                <p><strong>🤝 Contribuidores:</strong></p>
                <div>${contributorsHtml || 'Nenhum'}</div>
                <p><strong>⚖️ Licença:</strong> ${book.isEditable ? "Código aberto" : "Protegido"}</p>
            </div>
        `;
    }

    // Obtém lista de atos do capítulo atual
    function getCurrentActs() {
        if (!currentBook || !currentBook.chapters.length) return [];
        const chapter = currentBook.chapters[currentChapterIndex];
        return chapter.acts || [];
    }

    // Atualiza a exibição do ato atual (página inteira)
    function renderCurrentAct() {
        const acts = getCurrentActs();
        if (acts.length === 0) {
            actTitleEl.innerText = 'Sem atos';
            actContentEl.innerHTML = '<p style="color: var(--text-secondary);">Este capítulo não possui atos definidos.</p>';
            actCounterSpan.innerText = `0 / 0`;
            actPageIndicator.innerText = '';
            return;
        }
        if (currentActIndex >= acts.length) currentActIndex = acts.length - 1;
        if (currentActIndex < 0) currentActIndex = 0;
        const act = acts[currentActIndex];
        const actTitle = act.title || `Ato ${currentActIndex+1}`;
        actTitleEl.innerText = escapeHtml(actTitle);
        actContentEl.innerHTML = formatContentWithBreaks(act.content) || '<em>Conteúdo vazio.</em>';
        actCounterSpan.innerText = `${currentActIndex+1} / ${acts.length}`;
        actPageIndicator.innerText = `— ${actTitle} —`;
        
        // Atualizar contador de capítulo
        const totalChapters = currentBook.chapters.length;
        chapterCounterSpan.innerText = `Capítulo ${currentChapterIndex+1} / ${totalChapters}`;
        applyFontSize();
    }

    // Navegação entre capítulos (mantém o índice do ato zerado)
    function changeChapter(delta) {
        if (!currentBook || !currentBook.chapters.length) return;
        const newIndex = currentChapterIndex + delta;
        if (newIndex >= 0 && newIndex < currentBook.chapters.length) {
            currentChapterIndex = newIndex;
            currentActIndex = 0;
            renderCurrentAct();
            // rolar suavemente para o topo da página do ato
            document.getElementById('actPageContainer').scrollIntoView({ behavior: 'smooth', block: 'start' });
        } else {
            alert(delta > 0 ? "Último capítulo." : "Primeiro capítulo.");
        }
    }

    function nextChapter() { changeChapter(1); }
    function prevChapter() { changeChapter(-1); }

    // Navegação entre atos dentro do mesmo capítulo
    function changeAct(delta) {
        const acts = getCurrentActs();
        if (acts.length === 0) return;
        const newAct = currentActIndex + delta;
        if (newAct >= 0 && newAct < acts.length) {
            currentActIndex = newAct;
            renderCurrentAct();
        } else {
            // Se não houver próximo ato, tentar ir para o próximo capítulo (opcional)
            if (delta > 0 && currentChapterIndex + 1 < currentBook.chapters.length) {
                if (confirm("Fim dos atos deste capítulo. Ir para o próximo capítulo?")) {
                    currentChapterIndex++;
                    currentActIndex = 0;
                    renderCurrentAct();
                    document.getElementById('actPageContainer').scrollIntoView({ behavior: 'smooth' });
                }
            } else if (delta < 0 && currentChapterIndex > 0) {
                if (confirm("Início dos atos. Voltar ao capítulo anterior?")) {
                    currentChapterIndex--;
                    const prevActs = currentBook.chapters[currentChapterIndex].acts || [];
                    currentActIndex = prevActs.length - 1;
                    if (currentActIndex < 0) currentActIndex = 0;
                    renderCurrentAct();
                    document.getElementById('actPageContainer').scrollIntoView({ behavior: 'smooth' });
                }
            } else {
                alert(delta > 0 ? "Não há mais atos." : "Este é o primeiro ato.");
            }
        }
    }

    function nextAct() { changeAct(1); }
    function prevAct() { changeAct(-1); }

    // Constrói índice (sumário) com capítulos
    function buildTOC() {
        if (!currentBook) return;
        tocList.innerHTML = '';
        currentBook.chapters.forEach((chapter, idx) => {
            const li = document.createElement('li');
            li.innerText = `${idx+1}. ${chapter.title || `Capítulo ${idx+1}`}`;
            li.addEventListener('click', () => {
                currentChapterIndex = idx;
                currentActIndex = 0;
                renderCurrentAct();
                tocModal.style.display = 'none';
                document.getElementById('actPageContainer').scrollIntoView({ behavior: 'smooth' });
            });
            tocList.appendChild(li);
        });
    }

    // Importação do .dgbooks
    async function importDGBooks(file) {
        if (!file) return;
        const zip = new JSZip();
        try {
            const zipContent = await zip.loadAsync(file);
            const jsonFile = zipContent.file("data/book.json");
            if (!jsonFile) throw new Error("Arquivo inválido.");
            const jsonText = await jsonFile.async("string");
            const bookData = JSON.parse(jsonText);
            
            if (bookData.coverPath) {
                const coverFile = zipContent.file(bookData.coverPath);
                if (coverFile) {
                    const base64Data = await coverFile.async("base64");
                    const ext = bookData.coverPath.split('.').pop().toLowerCase();
                    const mime = `image/${ext === 'jpg' ? 'jpeg' : ext}`;
                    bookData.coverBase64 = `data:${mime};base64,${base64Data}`;
                } else bookData.coverBase64 = null;
            } else bookData.coverBase64 = null;
            
            bookData.chapters = bookData.chapters || [];
            bookData.genres = bookData.genres || [];
            bookData.contributors = bookData.contributors || [];
            bookData.title = bookData.title || "Sem título";
            bookData.author = bookData.author || "Desconhecido";
            
            currentBook = bookData;
            currentChapterIndex = 0;
            currentActIndex = 0;
            
            renderMetadata(currentBook);
            renderCurrentAct();
            buildTOC();
            
            importArea.style.display = 'none';
            bookContainer.style.display = 'block';
            setTimeout(() => document.querySelector('.metadata-panel').scrollIntoView({ behavior: 'smooth' }), 100);
        } catch (err) {
            alert("Erro ao importar o arquivo .dgbooks");
            console.error(err);
        }
    }

    function resetAndImport() {
        importArea.style.display = 'block';
        bookContainer.style.display = 'none';
        currentBook = null;
        metadataPanel.innerHTML = '';
        actTitleEl.innerText = '';
        actContentEl.innerHTML = '';
        chapterCounterSpan.innerText = '0 / 0';
        actCounterSpan.innerText = '0 / 0';
        fileInput.value = '';
    }

    // Exportar TXT completo
    function exportToTxt() {
        if (!currentBook) { alert("Nenhum livro carregado."); return; }
        let txt = `TÍTULO: ${currentBook.title}\nAUTOR: ${currentBook.author}\n\n`;
        for (let i=0; i<currentBook.chapters.length; i++) {
            const chap = currentBook.chapters[i];
            txt += `\n=== ${chap.title || `Capítulo ${i+1}`} ===\n`;
            if (chap.acts) {
                for (let a=0; a<chap.acts.length; a++) {
                    const act = chap.acts[a];
                    txt += `\n--- ${act.title || `Ato ${a+1}`} ---\n`;
                    txt += `${act.content || ''}\n`;
                }
            }
        }
        const blob = new Blob([txt], {type: "text/plain"});
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `${currentBook.title.replace(/[^a-z0-9]/gi, '_')}.txt`;
        link.click();
        URL.revokeObjectURL(link.href);
    }

    // Exportar PDF (impressão) - sem rodapé, cada ato em nova página
    function printFullBookAsPDF() {
        if (!currentBook) { alert("Carregue um livro primeiro."); return; }
        const win = window.open('', '_blank');
        if (!win) { alert("Permita pop-ups para gerar o PDF."); return; }
        
        let htmlContent = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${escapeHtml(currentBook.title)}</title><style>
            body { font-family: 'Georgia', serif; max-width: 800px; margin: 0 auto; padding: 1.5cm; line-height: 1.6; background: white; color: black; }
            .cover { text-align: center; margin-bottom: 40px; }
            .cover img { max-width: 250px; border-radius: 8px; }
            h1 { color: #b87c4f; }
            .chapter-title { font-size: 28px; margin: 40px 0 20px; color: #8b5a2b; border-bottom: 1px solid #ccc; }
            .act-page { break-before: page; page-break-before: always; margin-top: 20px; }
            .act-title { font-size: 22px; margin: 20px 0 16px; color: #5a3e2b; }
            .act-content { white-space: pre-wrap; }
            .metadata { margin-bottom: 30px; }
            @media print { body { margin: 0; padding: 1cm; } .no-break { break-inside: avoid; } }
        </style></head><body>`;
        
        // Capa
        htmlContent += `<div class="cover">`;
        if (currentBook.coverBase64) htmlContent += `<img src="${currentBook.coverBase64}" alt="Capa"><br>`;
        htmlContent += `<h1>${escapeHtml(currentBook.title)}</h1>`;
        htmlContent += `<p><strong>Autor:</strong> ${escapeHtml(currentBook.author)}</p>`;
        htmlContent += `<p><strong>Selo:</strong> ${escapeHtml((currentBook.company === 'custom' ? currentBook.customCompany : currentBook.company) || 'DG/ Books')}</p>`;
        htmlContent += `<p><strong>Gêneros:</strong> ${(currentBook.genres || []).map(g=>escapeHtml(g)).join(', ')}</p>`;
        htmlContent += `</div><hr>`;
        
        // Capítulos e Atos
        for (let i=0; i<currentBook.chapters.length; i++) {
            const chap = currentBook.chapters[i];
            htmlContent += `<div class="chapter-title">${escapeHtml(chap.title || `Capítulo ${i+1}`)}</div>`;
            const acts = chap.acts || [];
            if (acts.length === 0) {
                htmlContent += `<p><em>Sem atos registrados.</em></p>`;
            } else {
                for (let a=0; a<acts.length; a++) {
                    const act = acts[a];
                    htmlContent += `<div class="act-page">`;
                    htmlContent += `<div class="act-title">${escapeHtml(act.title || `Ato ${a+1}`)}</div>`;
                    htmlContent += `<div class="act-content">${escapeHtml(act.content || '').replace(/\n/g, '<br>')}</div>`;
                    htmlContent += `</div>`;
                }
            }
        }
        htmlContent += `</body></html>`;
        
        win.document.write(htmlContent);
        win.document.close();
        win.addEventListener('load', () => { win.print(); });
    }

    // Eventos
    function initEvents() {
        selectFileBtn.onclick = () => fileInput.click();
        fileInput.onchange = (e) => { if (e.target.files.length) importDGBooks(e.target.files[0]); };
        dropZone.onclick = () => fileInput.click();
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.style.background = 'var(--accent-soft)'; };
        dropZone.ondragleave = () => dropZone.style.background = '';
        dropZone.ondrop = (e) => { e.preventDefault(); dropZone.style.background = ''; if (e.dataTransfer.files.length) importDGBooks(e.dataTransfer.files[0]); };
        prevChapterBtn.onclick = prevChapter;
        nextChapterBtn.onclick = nextChapter;
        prevActBtn.onclick = prevAct;
        nextActBtn.onclick = nextAct;
        tocBtn.onclick = () => { buildTOC(); tocModal.style.display = 'flex'; };
        closeModalBtn.onclick = () => tocModal.style.display = 'none';
        window.onclick = (e) => { if (e.target === tocModal) tocModal.style.display = 'none'; };
        fontPlus.onclick = increaseFont;
        fontMinus.onclick = decreaseFont;
        themeToggle.onclick = toggleTheme;
        exportTxt.onclick = exportToTxt;
        printPdf.onclick = printFullBookAsPDF;
        openAnother.onclick = resetAndImport;
    }

    loadPreferences();
    initEvents();
</script>
</body>
</html>
